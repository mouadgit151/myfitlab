function todayKey(){ return new Date().toISOString().slice(0,10); }
function formatDate(k){ const [y,m,d]=k.split("-"); return `${d}/${m}/${y}`; }
function formatDateLong(k){ return new Date(k+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}); }

function protIng(key,g){
  const pv=PROTEIN_VARIANTS[key]||PROTEIN_VARIANTS.poulet;
  const kcal=Math.round(g*pv.kcalPer100/100), prot=Math.round(g*pv.protPer100/100);
  const fat=key==="boeuf"?Math.round(g*0.05):key==="thon"?Math.round(g*0.009):Math.round(g*0.018);
  const label=key==="thon"&&g===170?"1 canne de thon (~170g égoutté)":key==="thon"?`${g}g thon (égoutté)`:key==="boeuf"?`${g}g bœuf haché 5% (cru)`:`${g}g poitrine de poulet (cru)`;
  const sub=key==="poulet"?"Épices : ail, paprika, coriandre":key==="boeuf"?"Oignons, ail, sauce tomate":"Citron, poivre, coriandre";
  return [{label,kcal,prot,carbs:0,fat},{label:sub,kcal:0,prot:0,carbs:0,fat:0,note:true}];
}
function carbIng(key){
  if(key==="riz") return [{label:"80g riz blanc (sec)",kcal:288,prot:6,carbs:64,fat:1}];
  if(key==="pates") return [{label:"80g pâtes (sec)",kcal:280,prot:11,carbs:57,fat:2}];
  if(key==="cream_rice") return [{label:"35g Cream of Rice (sec)",kcal:126,prot:2,carbs:28,fat:0},{label:"Cannelle & sirop 0 sucre",kcal:0,prot:0,carbs:0,fat:0,note:true}];
  if(key==="patate_douce") return [{label:"150g patate douce (crue)",kcal:129,prot:2,carbs:30,fat:0}];
  return [{label:"80g riz blanc (sec)",kcal:288,prot:6,carbs:64,fat:1}];
}

// ─── UI COMPONENTS ─────────────────────────────────────────────────
function Circle({value,max,size=120,stroke=10,color="#a8ff78",children}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,pct=Math.min(Math.max(value/(max||1),0),1);
  return(
    <div style={{position:"relative",width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width={size} height={size} style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
          style={{transition:"stroke-dashoffset 0.5s ease",strokeLinecap:"round"}}/>
      </svg>
      <div style={{zIndex:1,textAlign:"center"}}>{children}</div>
    </div>
  );
}

// ─── AUTH SCREEN ────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);

  async function handle(){
    setLoading(true); setMsg("");
    try{
      let res;
      if(mode==="login"){
        res=await sb.auth.signInWithPassword({email,password});
      } else {
        res=await sb.auth.signUp({email,password});
      }
      if(res.error) setMsg("❌ "+res.error.message);
      else if(mode==="signup") setMsg("✅ Vérifie ton email pour confirmer ton compte !");
      else onAuth(res.data.user);
    } catch(e){ setMsg("❌ Erreur : "+e.message); }
    setLoading(false);
  }

  return(
    <div style={{minHeight:"100vh",background:"#0d0f14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 24px",fontFamily:"'DM Sans','Segoe UI',sans-serif"}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:48,marginBottom:12}}>🥗</div>
          <h1 style={{color:"#fff",fontWeight:800,fontSize:28,margin:0,letterSpacing:-0.5}}>Nutrition Tracker</h1>
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:14,marginTop:8}}>Tes données, synchronisées partout</p>
        </div>

        <div style={{display:"flex",gap:8,marginBottom:24,background:"rgba(255,255,255,0.06)",borderRadius:12,padding:4}}>
          {["login","signup"].map(m=>(
            <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"8px",border:"none",borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer",background:mode===m?"#a8ff78":"transparent",color:mode===m?"#0d0f14":"rgba(255,255,255,0.5)",transition:"all 0.2s"}}>
              {m==="login"?"Se connecter":"Créer un compte"}
            </button>
          ))}
        </div>

        {["Email","Mot de passe"].map((pl,i)=>(
          <input key={pl} type={i===0?"email":"password"} placeholder={pl}
            value={i===0?email:password} onChange={e=>i===0?setEmail(e.target.value):setPassword(e.target.value)}
            style={{display:"block",width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,padding:"14px 16px",color:"#fff",fontSize:15,outline:"none",marginBottom:12,boxSizing:"border-box"}}/>
        ))}

        <button onClick={handle} disabled={loading} style={{width:"100%",background:"#a8ff78",border:"none",borderRadius:12,padding:"14px",fontWeight:800,fontSize:16,color:"#0d0f14",cursor:"pointer",marginTop:4}}>
          {loading?"⏳ Chargement…":mode==="login"?"Se connecter →":"Créer mon compte →"}
        </button>

        {msg&&<div style={{marginTop:14,textAlign:"center",fontSize:13,color:msg.startsWith("✅")?"#a8ff78":"#ff8a78",background:"rgba(255,255,255,0.06)",borderRadius:10,padding:"10px 14px"}}>{msg}</div>}
      </div>
    </div>
  );
}

function DayPicker({dailyLogs,selectedDay,onSelect,onClose,onCreateDay}){
  const [view,setView]=useState("list");
  const days=Object.keys(dailyLogs).sort().reverse();
  const last90=Array.from({length:90},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.toISOString().slice(0,10);}).reverse();

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"#141720",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,maxHeight:"82vh",overflowY:"auto",paddingBottom:40}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"16px 20px 12px",borderBottom:"1px solid rgba(255,255,255,0.08)",position:"sticky",top:0,background:"#141720",zIndex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontWeight:800,fontSize:17}}>📅 Choisir un jour</span>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,color:"#fff",padding:"4px 10px",cursor:"pointer"}}>✕</button>
          </div>
          <div style={{display:"flex",gap:8}}>
            {[["list","📋 Liste"],["calendar","🗓 Calendrier"]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"7px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,background:view===v?"#a8ff78":"rgba(255,255,255,0.08)",color:view===v?"#0d0f14":"rgba(255,255,255,0.6)"}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{padding:"16px 20px 0"}}>
          {view==="list"&&(
            <>
              {days.length===0&&<div style={{textAlign:"center",color:"rgba(255,255,255,0.3)",padding:24}}>Aucun jour enregistré</div>}
              {days.map(d=>{
                const log=dailyLogs[d];
                const mp=buildMealPlan(log.isSportDay!==false,log.proteinKey,log.carbKey);
                const kcal=mp.filter(m=>log.meals?.[m.id]).reduce((s,m)=>s+m.kcal,0);
                const sel=d===selectedDay,isT=d===todayKey();
                return(
                  <div key={d} onClick={()=>{onSelect(d);onClose();}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",borderRadius:12,marginBottom:8,cursor:"pointer",background:sel?"rgba(168,255,120,0.1)":"rgba(255,255,255,0.04)",border:`1px solid ${sel?"rgba(168,255,120,0.4)":"rgba(255,255,255,0.07)"}`}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:6}}>
                        {isT?"Aujourd'hui":formatDateLong(d)}
                        {isT&&<span style={{fontSize:9,background:"#a8ff78",color:"#0d0f14",padding:"1px 6px",borderRadius:8,fontWeight:800}}>TODAY</span>}
                      </div>
                      <div style={{fontSize:11,color:log.isSportDay!==false?"#a8ff78":"#78b4ff",marginTop:2}}>
                        {log.isSportDay!==false?"💪 Sport":"😴 Repos"} · {kcal} kcal
                      </div>
                    </div>
                    <span style={{fontSize:18,color:sel?"#a8ff78":"rgba(255,255,255,0.3)"}}>{sel?"✓":"›"}</span>
                  </div>
                );
              })}
            </>
          )}
          {view==="calendar"&&(()=>{
            const weeks=[];let week=[];
            last90.forEach((d,i)=>{
              const dow=new Date(d+"T12:00:00").getDay(),adj=dow===0?6:dow-1;
              if(i===0) for(let j=0;j<adj;j++) week.push(null);
              week.push(d);
              if(week.length===7){weeks.push(week);week=[];}
            });
            if(week.length) weeks.push(week);
            return(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
                  {["L","M","M","J","V","S","D"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:700,padding:"4px 0"}}>{d}</div>)}

                    {w.map((d,di)=>{

                        <div key={d} onClick={()=>{hasLog?onSelect(d):onCreateDay(d);onClose();}} style={{height:38,borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:sel?"#a8ff78":isT?"rgba(168,255,120,0.18)":hasLog?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.02)",border:`1px solid ${sel?"#a8ff78":isT?"rgba(168,255,120,0.4)":"transparent"}`}}>
                          <span style={{fontSize:11,fontWeight:700,color:sel?"#0d0f14":"#fff"}}>{new Date(d+"T12:00:00").getDate()}</span>
                          {hasLog&&<div style={{width:4,height:4,borderRadius:"50%",background:sel?"#0d0f14":isSport?"#a8ff78":"#78b4ff",marginTop:1}}/>}
                        </div>
                      );
                    })}
                  </div>
                ))}
                <div style={{marginTop:10,fontSize:10,color:"rgba(255,255,255,0.3)"}}>Cliquer sur un jour vide pour le créer</div>
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState("home");
  const [profile,setProfileState]=useState({name:"Mouad",weight:94,height:179,age:27});
  const [dailyLogs,setDailyLogsState]=useState({});
  const [weightHistory,setWeightHistoryState]=useState([]);
  const [selectedDay,setSelectedDay]=useState(todayKey());
  const [showPicker,setShowPicker]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const syncTimeout=useRef(null);

  // ── Auth init ──
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){ setUser(session.user); loadData(session.user.id); }
      else setLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user){ setUser(session.user); loadData(session.user.id); }
      else { setUser(null); setLoading(false); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // ── Load data from Supabase ──
  async function loadData(uid){
    setLoading(true);
    try{
      const [p,l,w]=await Promise.all([
        sb.from("profiles").select("*").eq("user_id",uid).single(),
        sb.from("daily_logs").select("*").eq("user_id",uid),
        sb.from("weight_history").select("*").eq("user_id",uid).order("date",{ascending:true}),
      ]);
      if(p.data) setProfileState(p.data.data);
      if(l.data){
        const logs={};
        l.data.forEach(r=>{ logs[r.date]=r.data; });
        setDailyLogsState(logs);
      }
      if(w.data && w.data.length>0) setWeightHistoryState(w.data.map(r=>({date:r.date,weight:r.weight})));
      else setWeightHistoryState([{date:todayKey(),weight:94}]);
    } catch(e){ console.error(e); }
    // Ensure today exists
    setDailyLogsState(prev=>{
      if(!prev[todayKey()]) return {...prev,[todayKey()]:emptyLog()};
      return prev;
    });
    setLoading(false);
  }

  // ── Debounced sync to Supabase ──
  function scheduleSync(type,data){
    if(!user) return;
    clearTimeout(syncTimeout.current);
    syncTimeout.current=setTimeout(()=>syncToSupabase(type,data),1500);
  }

  async function syncToSupabase(type,data){
    if(!user) return;
    setSyncing(true);
    try{
      if(type==="profile"){
        await sb.from("profiles").upsert({user_id:user.id,data},{ onConflict:"user_id" });
      }
      if(type==="log"){
        const {date,log}=data;
        await sb.from("daily_logs").upsert({user_id:user.id,date,data:log},{onConflict:"user_id,date"});
      }
      if(type==="weight"){
        const {date,weight}=data;
        await sb.from("weight_history").upsert({user_id:user.id,date,weight},{onConflict:"user_id,date"});
      }
    } catch(e){ console.error("Sync error:",e); }
    setSyncing(false);
  }

  // ── State setters with sync ──
  function setProfile(val){
    const next=typeof val==="function"?val(profile):val;
    setProfileState(next);
    scheduleSync("profile",next);
  }
  function setDailyLogs(val){
    setDailyLogsState(prev=>{
      const next=typeof val==="function"?val(prev):val;
      return next;
    });
  }
  function updateLog(day,fn){
    setDailyLogsState(prev=>{
      const cur=prev[day]||emptyLog();
      const updated=fn(cur);
      const next={...prev,[day]:updated};
      // sync this specific log
      if(user) setTimeout(()=>syncToSupabase("log",{date:day,log:updated}),100);
      return next;
    });
  }
  function setWeightHistory(val){
    const next=typeof val==="function"?val(weightHistory):val;
    setWeightHistoryState(next);
    // sync latest entry
    if(next.length>0){
      const last=next[next.length-1];
      scheduleSync("weight",last);
    }
  }
  function createDay(day){
    if(!dailyLogs[day]){
      const newLog=emptyLog();
      setDailyLogsState(prev=>{
        const next={...prev,[day]:newLog};
        if(user) setTimeout(()=>syncToSupabase("log",{date:day,log:newLog}),100);
        return next;
      });
    }
    setSelectedDay(day);
  }

  async function signOut(){
    await sb.auth.signOut();
    setUser(null);
  }

  if(loading) return(
    <div style={{minHeight:"100vh",background:"#0d0f14",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16}}>🥗</div>
        <div style={{color:"rgba(255,255,255,0.4)",fontSize:14}}>Chargement…</div>
      </div>
    </div>
  );

  if(!user) return <AuthScreen onAuth={u=>{setUser(u);loadData(u.id);}}/>;

  function getLog(day){ return dailyLogs[day]||emptyLog(); }
  const todayLog=getLog(todayKey());
  const todayPlan=buildMealPlan(todayLog.isSportDay!==false,todayLog.proteinKey||"poulet",todayLog.carbKey||"riz");
  const totalKcal=todayPlan.reduce((s,m)=>s+m.kcal,0);
  const checkedKcal=todayPlan.reduce((s,m)=>todayLog.meals?.[m.id]?s+m.kcal:s,0);
  const checkedSupps=SUPPLEMENTS.filter(s=>todayLog.supplements?.[s.id]).length;
  const selLog=getLog(selectedDay);
  const selPlan=buildMealPlan(selLog.isSportDay!==false,selLog.proteinKey||"poulet",selLog.carbKey||"riz");

  const NAV=[{id:"home",l:"Accueil",i:"⬡"},{id:"nutrition",l:"Nutrition",i:"🥗"},{id:"chrono",l:"Chrono",i:"⏱"},{id:"exercise",l:"Exercices",i:"🏋️"},{id:"history",l:"Historique",i:"📅"},{id:"profile",l:"Profil",i:"👤"}];

  return(
    <div style={{minHeight:"100vh",background:"#0d0f14",fontFamily:"'DM Sans','Segoe UI',sans-serif",color:"#fff",maxWidth:480,margin:"0 auto",paddingBottom:80}}>
      {showPicker&&<DayPicker dailyLogs={dailyLogs} selectedDay={selectedDay} onSelect={d=>{setSelectedDay(d);if(page==="home")setPage("nutrition");}} onClose={()=>setShowPicker(false)} onCreateDay={d=>{createDay(d);setPage("nutrition");}}/>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1d27,#0d0f14)",padding:"14px 20px 12px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#a8ff78,#78ffd6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:800,color:"#0d0f14"}}>{profile.name[0].toUpperCase()}</div>
            <div>
              <div style={{fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:6}}>
                {profile.name}
                {syncing&&<span style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>↑ sync…</span>}
              </div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{profile.weight}kg · {profile.height}cm · {profile.age} ans</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div onClick={()=>setShowPicker(true)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.7)",cursor:"pointer"}}>
              📅 {selectedDay===todayKey()?"Auj.":formatDate(selectedDay)}
            </div>
            <div onClick={()=>updateLog(todayKey(),l=>({...l,isSportDay:!l.isSportDay}))} style={{background:todayLog.isSportDay!==false?"rgba(168,255,120,0.15)":"rgba(120,180,255,0.15)",border:`1px solid ${todayLog.isSportDay!==false?"#a8ff78":"#78b4ff"}`,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,color:todayLog.isSportDay!==false?"#a8ff78":"#78b4ff",cursor:"pointer"}}>
              {todayLog.isSportDay!==false?"💪 Sport":"😴 Repos"}
            </div>
          </div>
        </div>
      </div>

      {page==="home"&&<HomePage log={todayLog} mealPlan={todayPlan} totalKcal={totalKcal} checkedKcal={checkedKcal} checkedSupps={checkedSupps} updateLog={updateLog} setPage={setPage}/>}
      {page==="nutrition"&&<NutritionPage log={selLog} selectedDay={selectedDay} updateLog={updateLog} setShowPicker={setShowPicker} mealPlan={selPlan}/>}
      {page==="chrono"&&<ChronoPage log={todayLog} updateLog={updateLog}/>}
      {page==="exercise"&&<ExercisePage log={selLog} selectedDay={selectedDay} updateLog={updateLog} setShowPicker={setShowPicker}/>}
      {page==="history"&&<HistoryPage dailyLogs={dailyLogs} setSelectedDay={setSelectedDay} setPage={setPage} setShowPicker={setShowPicker}/>}
      {page==="profile"&&<ProfilePage profile={profile} setProfile={setProfile} weightHistory={weightHistory} setWeightHistory={setWeightHistory} onSignOut={signOut} userEmail={user.email}/>}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(13,15,20,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",padding:"8px 0 12px"}}>
        {NAV.map(p=>(
          <button key={p.id} onClick={()=>setPage(p.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 2px",color:page===p.id?"#a8ff78":"rgba(255,255,255,0.3)",transition:"color 0.2s"}}>
            <span style={{fontSize:18}}>{p.i}</span>
            <span style={{fontSize:9,fontWeight:600}}>{p.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

  const done=mealPlan.filter(m=>log.meals?.[m.id]);
  const totalK=done.reduce((s,m)=>s+m.kcal,0),maxK=mealPlan.reduce((s,m)=>s+m.kcal,0);
  const totalP=done.reduce((s,m)=>s+m.prot,0),totalC=done.reduce((s,m)=>s+m.carbs,0),totalF=done.reduce((s,m)=>s+(m.fat||0),0);

// ─── CHRONO PAGE ─────────────────────────────────────────────────────
function ChronoPage({log,updateLog}){
  const mp=buildMealPlan(log.isSportDay!==false,log.proteinKey||"poulet",log.carbKey||"riz");
  const allItems=[
    ...mp.map(m=>({type:"meal",id:m.id,time:m.time,label:m.label,emoji:m.emoji})),
    ...SUPPLEMENTS.map(s=>({type:"supp",id:s.id,time:s.time,label:s.label,emoji:s.emoji})),
    {type:"water",id:"w1",time:"09:00",label:"Eau — verre 1",emoji:"💧"},
    {type:"water",id:"w2",time:"11:00",label:"Eau — verre 2",emoji:"💧"},
    {type:"water",id:"w3",time:"13:00",label:"Eau — verre 3",emoji:"💧"},
    {type:"water",id:"w4",time:"15:00",label:"Eau — verre 4",emoji:"💧"},
    {type:"water",id:"w5",time:"17:00",label:"Eau — verres 5-6",emoji:"💧"},
    {type:"water",id:"w6",time:"19:30",label:"Eau — verre 7",emoji:"💧"},
    {type:"water",id:"w7",time:"21:00",label:"Eau — verre 8",emoji:"💧"},
  ].sort((a,b)=>a.time.localeCompare(b.time));

  const wc=log.waterChecks||{};
  function isChecked(item){ if(item.type==="meal") return !!log.meals?.[item.id]; if(item.type==="supp") return !!log.supplements?.[item.id]; return !!wc[item.id]; }
  function toggle(item){
    if(item.type==="meal") updateLog(todayKey(),l=>({...l,meals:{...l.meals,[item.id]:!l.meals?.[item.id]}}));
    else if(item.type==="supp") updateLog(todayKey(),l=>({...l,supplements:{...l.supplements,[item.id]:!l.supplements?.[item.id]}}));
    else updateLog(todayKey(),l=>({...l,waterChecks:{...(l.waterChecks||{}),[item.id]:!wc[item.id]}}));
  }
  const TC={meal:"#a8ff78",supp:"#d8a8ff",water:"#78c8ff"};
  const TL={meal:"Repas",supp:"Supplément",water:"Eau"};
  const done=allItems.filter(isChecked).length;

  return(
    <div style={{padding:"20px 20px 0"}}>
      <h2 style={{fontWeight:800,fontSize:22,margin:"0 0 4px"}}>⏱ Ordre Chronologique</h2>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:12}}>Aujourd'hui · {done}/{allItems.length} complétés</div>
      <div style={{height:4,background:"rgba(255,255,255,0.08)",borderRadius:2,marginBottom:22,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${(done/allItems.length)*100}%`,background:"linear-gradient(90deg,#a8ff78,#78ffd6)",borderRadius:2,transition:"width 0.4s"}}/>
      </div>
      <div style={{position:"relative"}}>
        <div style={{position:"absolute",left:47,top:0,bottom:0,width:1,background:"rgba(255,255,255,0.05)"}}/>
        {allItems.map(item=>{
          const checked=isChecked(item),color=TC[item.type];
          return(
            <div key={item.id} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
              <div style={{width:42,textAlign:"right",fontSize:11,color:"rgba(255,255,255,0.3)",paddingTop:10,flexShrink:0}}>{item.time}</div>
              <div style={{width:10,height:10,borderRadius:"50%",background:checked?color:"rgba(255,255,255,0.12)",flexShrink:0,marginTop:12,zIndex:1}}/>
              <div onClick={()=>toggle(item)} style={{flex:1,background:checked?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.03)",border:`1px solid ${checked?color+"44":"rgba(255,255,255,0.06)"}`,borderRadius:12,padding:"9px 14px",cursor:"pointer",transition:"all 0.2s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:17}}>{item.emoji}</span>
                  <div><div style={{fontSize:13,fontWeight:600,color:checked?"#fff":"rgba(255,255,255,0.6)"}}>{item.label}</div><div style={{fontSize:10,color,opacity:0.7}}>{TL[item.type]}</div></div>
                </div>
                <div style={{width:22,height:22,borderRadius:6,background:checked?color:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#0d0f14",fontWeight:800}}>{checked?"✓":""}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── EXERCISE PAGE ───────────────────────────────────────────────────

  function addEx(){ if(!newEx.trim()) return; const id=Date.now(); updateLog(selectedDay,l=>({...l,exercises:[...(l.exercises||[]),{id,name:newEx.trim(),sets:[],note:"",unit:"lbs"}]})); setNewEx(""); setExpanded(id); }
  function addSet(id){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,sets:[...ex.sets,{reps:"",weight:""}]}:ex)})); }
  function updateSet(id,si,f,v){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,sets:ex.sets.map((s,i)=>i===si?{...s,[f]:v}:s)}:ex)})); }
  function deleteSet(id,si){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,sets:ex.sets.filter((_,i)=>i!==si)}:ex)})); }

  function updateNote(id,note){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,note}:ex)})); }

// ─── PROFILE PAGE ────────────────────────────────────────────────────
function ProfilePage({profile,setProfile,weightHistory,setWeightHistory,onSignOut,userEmail}){
  const [editing,setEditing]=useState(false),[form,setForm]=useState({...profile}),[nw,setNw]=useState("");

  function save2(){ setProfile({...form,weight:parseFloat(form.weight)||profile.weight}); setEditing(false); }
  function logW(){
    const w=parseFloat(nw); if(!w) return;
    setWeightHistory(p=>[...p.filter(e=>e.date!==todayKey()),{date:todayKey(),weight:w}].sort((a,b)=>a.date.localeCompare(b.date)));
    setProfile(p=>({...p,weight:w})); setNw("");
  }

  function WeightGraph(){
    if(weightHistory.length<2) return <div style={{textAlign:"center",padding:"24px 0",color:"rgba(255,255,255,0.3)",fontSize:13}}>Ajoute au moins 2 pesées</div>;
    const W=340,H=140,p={t:20,r:20,b:30,l:40};
    const data=weightHistory.slice(-20),ws=data.map(d=>d.weight);
    const minW=Math.min(...ws)-1,maxW=Math.max(...ws)+1;
    const xs=(i)=>p.l+i*(W-p.l-p.r)/Math.max(data.length-1,1);
    const ys=(v)=>H-p.b-((v-minW)/(maxW-minW))*(H-p.t-p.b);
    const pts=data.map((d,i)=>`${xs(i)},${ys(d.weight)}`).join(" ");
    const area=`${xs(0)},${H-p.b} `+pts+` ${xs(data.length-1)},${H-p.b}`;
    return(
      <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
        <defs><linearGradient id="wgg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#a8ff78" stopOpacity="0.3"/><stop offset="100%" stopColor="#a8ff78" stopOpacity="0"/></linearGradient></defs>
        {[minW,(minW+maxW)/2,maxW].map((v,i)=><g key={i}><line x1={p.l} y1={ys(v)} x2={W-p.r} y2={ys(v)} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/><text x={p.l-4} y={ys(v)+4} textAnchor="end" fontSize="9" fill="rgba(255,255,255,0.3)">{v.toFixed(1)}</text></g>)}
        <polygon points={area} fill="url(#wgg)"/>
        <polyline points={pts} fill="none" stroke="#a8ff78" strokeWidth="2" strokeLinejoin="round"/>
        {data.map((d,i)=><g key={i}><circle cx={xs(i)} cy={ys(d.weight)} r="4" fill="#a8ff78"/>{i%Math.ceil(data.length/5)===0&&<text x={xs(i)} y={H-8} textAnchor="middle" fontSize="8" fill="rgba(255,255,255,0.3)">{formatDate(d.date).slice(0,5)}</text>}</g>)}
      </svg>
    );
  }

  const diff=profile.weight-(weightHistory[0]?.weight||profile.weight);
  const bmi=(profile.weight/((profile.height/100)**2)).toFixed(1);

  return(
    <div style={{padding:"20px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontWeight:800,fontSize:22,margin:0}}>👤 Profil</h2>
        <button onClick={()=>editing?save2():setEditing(true)} style={{background:editing?"#a8ff78":"rgba(255,255,255,0.1)",border:"none",borderRadius:10,padding:"8px 16px",color:editing?"#0d0f14":"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>{editing?"✓ Sauvegarder":"✏️ Modifier"}</button>
      </div>
      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Connecté avec</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",fontWeight:600,marginTop:2}}>{userEmail}</div>
        </div>
        <button onClick={onSignOut} style={{background:"rgba(255,80,80,0.12)",border:"1px solid rgba(255,80,80,0.2)",borderRadius:10,padding:"7px 14px",color:"#ff8a78",fontWeight:700,cursor:"pointer",fontSize:12}}>Déconnexion</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        {[{l:"Poids actuel",v:`${profile.weight} kg`,c:"#a8ff78"},{l:"IMC",v:bmi,c:"#ffa878"},{l:"Taille",v:`${profile.height} cm`,c:"#78c8ff"},{l:"Âge",v:`${profile.age} ans`,c:"#d8a8ff"}].map(s=>(
          <div key={s.l} style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"14px 16px"}}><div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{s.l}</div></div>
        ))}
      </div>
      {editing&&(
        <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16,marginBottom:20}}>
          {[{k:"name",l:"Prénom",t:"text"},{k:"weight",l:"Poids (kg)",t:"number"},{k:"height",l:"Taille (cm)",t:"number"},{k:"age",l:"Âge",t:"number"}].map(f=>(
            <div key={f.k} style={{marginBottom:10}}>
              <label style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontWeight:600}}>{f.l}</label>
              <input type={f.t} value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={{display:"block",width:"100%",marginTop:4,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            </div>
          ))}
        </div>
      )}
      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16,marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📊 Logger le poids</div>
        <div style={{display:"flex",gap:8}}>
          <input type="number" value={nw} onChange={e=>setNw(e.target.value)} placeholder="Ex: 93.5" style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 12px",color:"#fff",fontSize:14,outline:"none"}}/>
          <button onClick={logW} style={{background:"#a8ff78",border:"none",borderRadius:8,padding:"9px 20px",fontWeight:800,color:"#0d0f14",cursor:"pointer",fontSize:13}}>Logger</button>
        </div>
        {diff!==0&&<div style={{marginTop:10,fontSize:13,color:diff<0?"#a8ff78":"#ff8a78",fontWeight:600}}>{diff<0?`▼ ${Math.abs(diff).toFixed(1)} kg perdus`:`▲ ${diff.toFixed(1)} kg pris`} depuis le début</div>}
      </div>
      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16,marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>📈 Évolution du poids</div>
        <WeightGraph/>
      </div>
      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16,marginBottom:24}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📋 Historique des pesées</div>
        {[...weightHistory].reverse().map((e,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>{e.date===todayKey()?"Aujourd'hui":formatDate(e.date)}</span>
            <span style={{fontSize:13,fontWeight:700,color:"#a8ff78"}}>{e.weight} kg</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
