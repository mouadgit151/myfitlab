// ─── HELPERS ──────────────────────────────────────────────────────────────────
function calcFoodMacros(food, amount, unit) {
  const a = parseFloat(amount) || 0;
  if (a === 0) return { kcal:0, prot:0, carbs:0, fat:0 };
  // perQty items (yaourt, rice cake, oeufs) have exact per-unit values
  if (unit === "qty" && food.perQty) {
    return { kcal: Math.round(food.qtyKcal * a), prot: Math.round(food.qtyProt * a * 10)/10, carbs: Math.round(food.qtyCarbs * a * 10)/10, fat: Math.round(food.qtyFat * a * 10)/10 };
  }
  let grams = a;
  if (unit === "qty") grams = a * (food.qtyG || 100);
  else if (unit === "half") grams = a * (food.halfG || 75);
  else if (unit === "can") grams = a * (food.canG || 170);
  else if (unit === "tsp") grams = a * (food.tspG || 5);
  // ml treated as g (close enough for liquids like egg whites, oil)
  return {
    kcal:  Math.round(grams * food.kcal  / 100),
    prot:  Math.round(grams * food.prot  / 100 * 10) / 10,
    carbs: Math.round(grams * food.carbs / 100 * 10) / 10,
    fat:   Math.round(grams * food.fat   / 100 * 10) / 10,
  };
}

function unitLabel(unit, food) {
  if (unit === "qty") return food.name.includes("Œuf") ? "œuf(s)" : "unité(s)";
  if (unit === "half") return "½ avocat";
  if (unit === "can") return "canne(s)";
  if (unit === "tsp") return "c. à thé";
  return unit;
}

// ─── UI ATOMS ─────────────────────────────────────────────────────────────────
function Circle({value,max,size=120,stroke=10,color="#a8ff78",children}){
  const r=(size-stroke)/2, circ=2*Math.PI*r, pct=Math.min(Math.max(value/(max||1),0),1);
  return(
    <div style={{position:"relative",width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width={size} height={size} style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
          style={{transition:"stroke-dashoffset 0.5s ease",strokeLinecap:"round"}}/>
      </svg>
      <div style={{zIndex:1,textAlign:"center"}}>{children}</div>
    </div>
  );
}

function MacroBadge({kcal,prot,carbs,fat,size="sm"}){
  const fs = size==="sm" ? 10 : 12;
  const items = [{v:kcal,l:"kcal",c:"#a8ff78"},{v:`${prot}g`,l:"P",c:"#ff9f78"},{v:`${carbs}g`,l:"C",c:"#78c8ff"},{v:`${fat}g`,l:"L",c:"#ffd4a8"}];
  return(
    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
      {items.map(it=>(
        <span key={it.l} style={{fontSize:fs,fontWeight:700,color:it.c,background:`${it.c}18`,borderRadius:5,padding:"1px 5px",whiteSpace:"nowrap"}}>{it.v} {it.l}</span>
      ))}
    </div>
  );
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);

  async function handle(){
    setLoading(true); setMsg("");
    try{
      let res = mode==="login"
        ? await sb.auth.signInWithPassword({email,password:pw})
        : await sb.auth.signUp({email,password:pw});
      if(res.error) setMsg("❌ "+res.error.message);
      else if(mode==="signup") setMsg("✅ Vérifie ton email pour confirmer !");
      else onAuth(res.data.user);
    } catch(e){ setMsg("❌ "+e.message); }
    setLoading(false);
  }

  return(
    <div style={{minHeight:"100vh",background:"#0d0f14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 24px",fontFamily:"'DM Sans','Segoe UI',sans-serif"}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:8}}>🥗</div>
          <h1 style={{color:"#fff",fontWeight:800,fontSize:26,margin:0}}>Nutrition Tracker</h1>
          <p style={{color:"rgba(255,255,255,0.35)",fontSize:13,marginTop:6,fontStyle:"italic"}}>"Trust the process"</p>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:20,background:"rgba(255,255,255,0.06)",borderRadius:12,padding:4}}>
          {["login","signup"].map(m=>(
            <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"8px",border:"none",borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer",background:mode===m?"#a8ff78":"transparent",color:mode===m?"#0d0f14":"rgba(255,255,255,0.5)"}}>
              {m==="login"?"Se connecter":"Créer un compte"}
            </button>
          ))}
        </div>
        <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)}
          style={{display:"block",width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,padding:"13px 16px",color:"#fff",fontSize:15,outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
        <input type="password" placeholder="Mot de passe" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handle()}

        <button onClick={handle} disabled={loading} style={{width:"100%",background:"#a8ff78",border:"none",borderRadius:12,padding:"13px",fontWeight:800,fontSize:16,color:"#0d0f14",cursor:"pointer"}}>
          {loading?"⏳ Chargement…":mode==="login"?"Se connecter →":"Créer mon compte →"}
        </button>
        {msg&&<div style={{marginTop:12,textAlign:"center",fontSize:13,color:msg.startsWith("✅")?"#a8ff78":"#ff8a78",background:"rgba(255,255,255,0.06)",borderRadius:10,padding:"10px 14px"}}>{msg}</div>}
      </div>

  );
}

                    {isT?"Aujourd'hui":formatDateLong(d)}
                    {isT&&<span style={{fontSize:9,background:"#a8ff78",color:"#0d0f14",padding:"1px 6px",borderRadius:8,fontWeight:800}}>TODAY</span>}
                  </div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{totalK} kcal loggés</div>
                </div>
                <span style={{fontSize:18,color:sel?"#a8ff78":"rgba(255,255,255,0.3)"}}>{sel?"✓":"›"}</span>
              </div>
            );
          })}
          {view==="calendar"&&(()=>{
            const weeks=[];let week=[];
            last90.forEach((d,i)=>{
              const dow=new Date(d+"T12:00:00").getDay(),adj=dow===0?6:dow-1;
              if(i===0) for(let j=0;j<adj;j++) week.push(null);
              week.push(d);
              if(week.length===7){weeks.push(week);week=[];}
            });
            if(week.length) weeks.push(week);
            return(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
                  {["L","M","M","J","V","S","D"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:700,padding:"4px 0"}}>{d}</div>)}
                </div>
                {weeks.slice(-13).map((w,wi)=>(
                  <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
                    {w.map((d,di)=>{
                      if(!d) return <div key={di}/>;
                      const hasLog=!!dailyLogs[d],sel=d===selectedDay,isT=d===todayKey();
                      return(
                        <div key={d} onClick={()=>{hasLog?onSelect(d):onCreateDay(d);onClose();}} style={{height:36,borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:sel?"#a8ff78":isT?"rgba(168,255,120,0.2)":hasLog?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.02)",border:`1px solid ${sel?"#a8ff78":isT?"rgba(168,255,120,0.4)":"transparent"}`}}>
                          <span style={{fontSize:11,fontWeight:700,color:sel?"#0d0f14":"#fff"}}>{new Date(d+"T12:00:00").getDate()}</span>
                          {hasLog&&<div style={{width:4,height:4,borderRadius:"50%",background:sel?"#0d0f14":"#a8ff78",marginTop:1}}/>}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

// ─── REST TIMER ───────────────────────────────────────────────────────────────
function RestTimer(){
  const [active,setActive]=useState(false);
  const [total,setTotal]=useState(90);
  const [remaining,setRemaining]=useState(90);
  const [finished,setFinished]=useState(false);
  const iv=useRef(null);

  function start(secs){
    setTotal(secs); setRemaining(secs); setActive(true); setFinished(false);
    clearInterval(iv.current);
    iv.current=setInterval(()=>{
      setRemaining(r=>{
        if(r<=1){ clearInterval(iv.current); setActive(false); setFinished(true); return 0; }
        return r-1;
      });
    },1000);
  }
  function stop(){ clearInterval(iv.current); setActive(false); setRemaining(total); setFinished(false); }

  const pct=remaining/total;
  const mins=Math.floor(remaining/60);
  const secs=remaining%60;

  return(
    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:"14px 16px",marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>⏱ Rest Timer</div>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        {/* Mini circle */}
        <Circle value={total-remaining} max={total} size={72} stroke={7} color={finished?"#ff8a78":active?"#a8ff78":"rgba(255,255,255,0.2)"}>
          <div style={{fontSize:finished?11:14,fontWeight:800,color:finished?"#ff8a78":active?"#a8ff78":"rgba(255,255,255,0.5)"}}>
            {finished?"DONE!":active?`${mins}:${String(secs).padStart(2,"0")}`:"REST"}
          </div>
        </Circle>
        <div style={{flex:1}}>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            {[60,90,120,180].map(s=>(
              <button key={s} onClick={()=>start(s)} style={{flex:1,padding:"6px 2px",borderRadius:8,border:`1px solid ${active&&total===s?"#a8ff78":"rgba(255,255,255,0.1)"}`,background:active&&total===s?"rgba(168,255,120,0.15)":"rgba(255,255,255,0.05)",color:active&&total===s?"#a8ff78":"rgba(255,255,255,0.7)",fontWeight:700,cursor:"pointer",fontSize:11}}>
                {s<60?`${s}s`:`${s/60}m`}
              </button>
            ))}
          </div>
          {active&&<button onClick={stop} style={{width:"100%",padding:"7px",borderRadius:8,border:"1px solid rgba(255,80,80,0.3)",background:"rgba(255,80,80,0.1)",color:"#ff8a78",fontWeight:700,cursor:"pointer",fontSize:12}}>✕ Stop</button>}
          {!active&&!finished&&<div style={{fontSize:11,color:"rgba(255,255,255,0.3)",textAlign:"center"}}>Sélectionne une durée</div>}
          {finished&&<button onClick={()=>{setFinished(false);}} style={{width:"100%",padding:"7px",borderRadius:8,border:"1px solid rgba(168,255,120,0.3)",background:"rgba(168,255,120,0.1)",color:"#a8ff78",fontWeight:700,cursor:"pointer",fontSize:12}}>✓ OK, c'est parti !</button>}
        </div>
      </div>
    </div>
  );
}

// ─── FOOD LOGGER PAGE ─────────────────────────────────────────────────────────
function FoodLoggerPage({log,selectedDay,updateLog,setShowPicker}){
  const [activeSlot,setActiveSlot]=useState(null); // null = overview, else slot id
  const [search,setSearch]=useState("");
  const [selectedFood,setSelectedFood]=useState(null);
  const [amount,setAmount]=useState("");
  const [unit,setUnit]=useState("");
  const [recentUsed,setRecentUsed]=useState([]); // [{foodId, amount, unit}]

  const isToday=selectedDay===todayKey();
  const foodLog=log.foodLog||{};

  // Totals across all slots
  const allItems=Object.values(foodLog).flat();
  const totalKcal=allItems.reduce((s,it)=>s+it.kcal,0);
  const totalProt=allItems.reduce((s,it)=>s+it.prot,0);
  const totalCarbs=allItems.reduce((s,it)=>s+it.carbs,0);
  const totalFat=allItems.reduce((s,it)=>s+it.fat,0);

  // Search logic
  const searchLower=search.toLowerCase().trim();
  let filteredFoods=[];
  if(searchLower){
    // Check if query matches a muscle group name (for exercise) or food category
    const catMatches=FOOD_DB.filter(f=>f.cat.toLowerCase().includes(searchLower));
    const nameMatches=FOOD_DB.filter(f=>f.name.toLowerCase().includes(searchLower)&&!catMatches.includes(f));
    filteredFoods=[...catMatches,...nameMatches];
  }

  function selectFood(food){
    setSelectedFood(food);
    setUnit(food.defaultUnit);
    // Default amounts
    if(food.defaultUnit==="qty") setAmount("1");
    else if(food.defaultUnit==="half") setAmount("1");
    else if(food.defaultUnit==="can") setAmount("1");
    else if(food.defaultUnit==="tsp") setAmount("1");
    else if(food.id==="blancs_oeuf") setAmount("150");
    else if(food.id==="avocat") setAmount("1");
    else setAmount("100");
    setSearch("");
  }

  function addToLog(){
    if(!selectedFood||!amount||!activeSlot) return;
    const macros=calcFoodMacros(selectedFood,amount,unit);
    const entry={
      id:Date.now(),
      foodId:selectedFood.id,
      name:selectedFood.name,
      amount:parseFloat(amount),
      unit,
      ...macros,
    };
    // Update recent (deduplicate by foodId, keep unique amount)
    setRecentUsed(prev=>{
      const filtered=prev.filter(r=>r.foodId!==selectedFood.id);
      return [{foodId:selectedFood.id,amount:parseFloat(amount),unit},...filtered].slice(0,6);
    });
    updateLog(selectedDay,l=>{
      const fl=l.foodLog||{};
      const slot=fl[activeSlot]||[];
      return {...l, foodLog:{...fl,[activeSlot]:[...slot,entry]}};
    });
    setSelectedFood(null);
    setAmount("");
  }

  function removeItem(slotId,itemId){
    updateLog(selectedDay,l=>{
      const fl=l.foodLog||{};
      return {...l, foodLog:{...fl,[slotId]:(fl[slotId]||[]).filter(it=>it.id!==itemId)}};
    });
  }

  const preview = selectedFood ? calcFoodMacros(selectedFood,amount,unit) : null;

  // ── Overview mode ──
  if(!activeSlot){
    return(
      <div style={{padding:"20px 20px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontWeight:800,fontSize:22,margin:0}}>📓 Journal</h2>
          <button onClick={()=>setShowPicker(true)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"6px 12px",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.8)",cursor:"pointer"}}>📅 {isToday?"Aujourd'hui":formatDate(selectedDay)} ▾</button>
        </div>

        {/* Daily totals */}
        <div style={{background:"linear-gradient(135deg,rgba(168,255,120,0.08),rgba(120,200,255,0.05))",border:"1px solid rgba(168,255,120,0.15)",borderRadius:16,padding:"14px 16px",marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:13,color:"rgba(255,255,255,0.6)",marginBottom:10}}>Total de la journée</div>
          <div style={{display:"flex",gap:8}}>
            {[{l:"Kcal",v:totalKcal,c:"#a8ff78"},{l:"Prot.",v:`${Math.round(totalProt)}g`,c:"#ff9f78"},{l:"Carbs",v:`${Math.round(totalCarbs)}g`,c:"#78c8ff"},{l:"Lip.",v:`${Math.round(totalFat)}g`,c:"#ffd4a8"}].map(s=>(
              <div key={s.l} style={{flex:1,background:"rgba(255,255,255,0.05)",borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
                <div style={{fontSize:17,fontWeight:800,color:s.c}}>{s.v}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Meal slots */}
        {MEAL_SLOTS.map(slot=>{
          const items=foodLog[slot.id]||[];

}

// ─── EXERCISE PAGE ────────────────────────────────────────────────────────────
function ExercisePage({log,selectedDay,updateLog,setShowPicker}){
  const [exSearch,setExSearch]=useState("");
  const [expanded,setExpanded]=useState(null);
  const exercises=log.exercises||[];
  const isToday=selectedDay===todayKey();

  // Smart search: muscle group match first, then name contains
  function searchExercises(q){
    if(!q) return [];
    const ql=q.toLowerCase();
    const muscleFirst=EXERCISE_DB.filter(e=>e.muscle.toLowerCase()===ql||e.muscle.toLowerCase().includes(ql));
    const nameOnly=EXERCISE_DB.filter(e=>e.name.toLowerCase().includes(ql)&&!muscleFirst.includes(e));
    return [...muscleFirst,...nameOnly];
  }

  const suggestions=exSearch?searchExercises(exSearch):[];

  function addExercise(name,muscle){
    const id=Date.now();
    updateLog(selectedDay,l=>({...l,exercises:[...(l.exercises||[]),{id,name,muscle:muscle||"",sets:[],note:"",unit:"lbs"}]}));
    setExSearch(""); setExpanded(id);
  }
  function addSet(id){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,sets:[...ex.sets,{reps:"",weight:""}]}:ex)})); }
  function updateSet(id,si,f,v){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,sets:ex.sets.map((s,i)=>i===si?{...s,[f]:v}:s)}:ex)})); }
  function deleteSet(id,si){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,sets:ex.sets.filter((_,i)=>i!==si)}:ex)})); }
  function deleteEx(id){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.filter(ex=>ex.id!==id)})); if(expanded===id) setExpanded(null); }
  function updateNote(id,note){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,note}:ex)})); }
  function toggleUnit(id){ updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,unit:ex.unit==="kg"?"lbs":"kg"}:ex)})); }

  return(
    <div style={{padding:"20px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontWeight:800,fontSize:22,margin:0}}>🏋️ Exercices</h2>
        <button onClick={()=>setShowPicker(true)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"6px 12px",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.8)",cursor:"pointer"}}>📅 {isToday?"Aujourd'hui":formatDate(selectedDay)} ▾</button>
      </div>

      {/* Rest Timer */}
      <RestTimer/>

      {/* Search */}
      <div style={{position:"relative",marginBottom:16}}>
        <input value={exSearch} onChange={e=>setExSearch(e.target.value)}
          placeholder="Chercher un exercice ou groupe musculaire (ex: chest, back)…"
          style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"11px 14px",color:"#fff",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
        {suggestions.length>0&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#141720",borderRadius:12,border:"1px solid rgba(255,255,255,0.1)",zIndex:10,maxHeight:240,overflowY:"auto",marginTop:4}}>
            {suggestions.map((ex,i)=>(
              <div key={i} onClick={()=>addExercise(ex.name,ex.muscle)} style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,fontWeight:600,color:"#fff"}}>{ex.name}</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.35)",background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"2px 7px"}}>{ex.muscle}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {exercises.length===0&&<div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",fontSize:14,padding:"30px 0"}}>{isToday?"Commence ta séance !":"Aucun exercice ce jour-là"}</div>}

      {exercises.map(ex=>{
        const unit=ex.unit||"lbs";
        const totalVol=ex.sets.reduce((s,st)=>{const r=parseInt(st.reps)||0,w=parseFloat(st.weight)||0;return s+r*(unit==="kg"?w*KG_TO_LBS:w);},0);
        return(
          <div key={ex.id} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,marginBottom:12,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",padding:"13px 16px",cursor:"pointer",gap:10}} onClick={()=>setExpanded(expanded===ex.id?null:ex.id)}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}}>{ex.name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",display:"flex",gap:8,flexWrap:"wrap"}}>
                  {ex.muscle&&<span style={{color:"rgba(168,255,120,0.7)"}}>{ex.muscle}</span>}
                  <span>· {ex.sets.length} série(s)</span>
                  <span>· {ex.sets.reduce((s,st)=>s+(parseInt(st.reps)||0),0)} reps</span>
                  {totalVol>0&&<span style={{color:"#a8ff78"}}>· {Math.round(totalVol)} lbs vol</span>}
                </div>
              </div>
              <div onClick={e=>{e.stopPropagation();toggleUnit(ex.id);}} style={{background:unit==="kg"?"rgba(255,200,120,0.15)":"rgba(120,200,255,0.15)",border:`1px solid ${unit==="kg"?"#ffc878":"#78c8ff"}`,borderRadius:12,padding:"3px 8px",fontSize:10,fontWeight:700,color:unit==="kg"?"#ffc878":"#78c8ff",cursor:"pointer"}}>{unit.toUpperCase()}</div>
              <span style={{fontSize:16,color:"rgba(255,255,255,0.3)"}}>{expanded===ex.id?"▾":"▸"}</span>
              <button onClick={e=>{e.stopPropagation();deleteEx(ex.id);}} style={{background:"rgba(255,80,80,0.12)",border:"none",borderRadius:6,color:"#ff5050",padding:"4px 8px",cursor:"pointer",fontSize:11}}>✕</button>
            </div>
            {expanded===ex.id&&(
              <div style={{padding:"0 16px 14px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{display:"flex",gap:6,fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:700,marginBottom:6,marginTop:12}}>

                </div>
                {ex.sets.map((set,si)=>{

                  const lbsNote=w&&unit==="kg"?` = ${(w*KG_TO_LBS).toFixed(1)} lbs`:"";
                  return(
                    <div key={si} style={{marginBottom:8}}>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <div style={{width:44,fontSize:12,color:"rgba(255,255,255,0.5)",fontWeight:700}}>S{si+1}</div>

                        <input value={set.weight} onChange={e=>updateSet(ex.id,si,"weight",e.target.value)} placeholder={unit} style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"7px 10px",color:"#fff",fontSize:13,outline:"none"}}/>

                      </div>
                      {lbsNote&&<div style={{fontSize:9,color:"#ffc878",paddingLeft:50,marginTop:1}}>{lbsNote}</div>}
                    </div>
                  );
                })}
                <button onClick={()=>addSet(ex.id)} style={{width:"100%",background:"rgba(168,255,120,0.08)",border:"1px dashed rgba(168,255,120,0.3)",borderRadius:8,padding:"8px",color:"#a8ff78",cursor:"pointer",fontSize:12,fontWeight:600,marginTop:4}}>+ Série</button>
                {ex.sets.length>0&&(
                  <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px",marginTop:10}}>
                    <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.5)",marginBottom:4}}>Résumé</div>
                    {ex.sets.map((set,si)=>{
                      const r=parseInt(set.reps)||0,w=parseFloat(set.weight)||0;
                      const wLbs=unit==="kg"?w*KG_TO_LBS:w;
                      return(<div key={si} style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginBottom:2}}>S{si+1}: {r} reps × {wLbs>0?`${wLbs.toFixed(unit==="kg"?1:0)} lbs`:"-"}{unit==="kg"&&w>0?` (${w} kg)`:""}</div>);
                    })}
                    {totalVol>0&&<div style={{fontSize:11,color:"#a8ff78",fontWeight:700,marginTop:4,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:4}}>Volume total : {Math.round(totalVol)} lbs</div>}

                <textarea value={ex.note||""} onChange={e=>updateNote(ex.id,e.target.value)} placeholder="Notes…" rows={2} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"8px 10px",color:"rgba(255,255,255,0.6)",fontSize:12,resize:"none",marginTop:10,outline:"none",boxSizing:"border-box"}}/>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────
function ProfilePage({profile,setProfile,weightHistory,setWeightHistory,onSignOut,userEmail}){
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({...profile});
  const [nw,setNw]=useState("");

  function save2(){ setProfile({...form,weight:parseFloat(form.weight)||profile.weight}); setEditing(false); }
  function logW(){
    const w=parseFloat(nw); if(!w) return;
    setWeightHistory(p=>[...p.filter(e=>e.date!==todayKey()),{date:todayKey(),weight:w}].sort((a,b)=>a.date.localeCompare(b.date)));
    setProfile(p=>({...p,weight:w})); setNw("");
  }

  function WeightGraph(){
    if(weightHistory.length<2) return <div style={{textAlign:"center",padding:"20px 0",color:"rgba(255,255,255,0.3)",fontSize:13}}>Ajoute au moins 2 pesées</div>;
    const W=320,H=130,p={t:16,r:16,b:26,l:36};
    const data=weightHistory.slice(-20),ws=data.map(d=>d.weight);
    const minW=Math.min(...ws)-1,maxW=Math.max(...ws)+1;
    const xs=i=>p.l+i*(W-p.l-p.r)/Math.max(data.length-1,1);
    const ys=v=>H-p.b-((v-minW)/(maxW-minW))*(H-p.t-p.b);
    const pts=data.map((d,i)=>`${xs(i)},${ys(d.weight)}`).join(" ");
    const area=`${xs(0)},${H-p.b} `+pts+` ${xs(data.length-1)},${H-p.b}`;
    return(
      <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
        <defs><linearGradient id="wgg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#a8ff78" stopOpacity="0.3"/><stop offset="100%" stopColor="#a8ff78" stopOpacity="0"/></linearGradient></defs>
        {[minW,(minW+maxW)/2,maxW].map((v,i)=><g key={i}><line x1={p.l} y1={ys(v)} x2={W-p.r} y2={ys(v)} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/><text x={p.l-3} y={ys(v)+3} textAnchor="end" fontSize="8" fill="rgba(255,255,255,0.3)">{v.toFixed(1)}</text></g>)}
        <polygon points={area} fill="url(#wgg)"/>
        <polyline points={pts} fill="none" stroke="#a8ff78" strokeWidth="2" strokeLinejoin="round"/>
        {data.map((d,i)=><g key={i}><circle cx={xs(i)} cy={ys(d.weight)} r="3.5" fill="#a8ff78"/>{i%Math.ceil(data.length/5)===0&&<text x={xs(i)} y={H-6} textAnchor="middle" fontSize="7" fill="rgba(255,255,255,0.3)">{formatDate(d.date).slice(0,5)}</text>}</g>)}
      </svg>
    );
  }

  const diff=profile.weight-(weightHistory[0]?.weight||profile.weight);
  const bmi=(profile.weight/((profile.height/100)**2)).toFixed(1);

  return(
    <div style={{padding:"20px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontWeight:800,fontSize:22,margin:0}}>👤 Profil</h2>
        <button onClick={()=>editing?save2():setEditing(true)} style={{background:editing?"#a8ff78":"rgba(255,255,255,0.1)",border:"none",borderRadius:10,padding:"8px 16px",color:editing?"#0d0f14":"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>{editing?"✓ Sauvegarder":"✏️ Modifier"}</button>
      </div>

      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Connecté</div><div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginTop:1}}>{userEmail}</div></div>
        <button onClick={onSignOut} style={{background:"rgba(255,80,80,0.12)",border:"1px solid rgba(255,80,80,0.2)",borderRadius:10,padding:"6px 12px",color:"#ff8a78",fontWeight:700,cursor:"pointer",fontSize:12}}>Déconnexion</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {[{l:"Poids",v:`${profile.weight} kg`,c:"#a8ff78"},{l:"IMC",v:bmi,c:"#ffa878"},{l:"Taille",v:`${profile.height} cm`,c:"#78c8ff"},{l:"Âge",v:`${profile.age} ans`,c:"#d8a8ff"}].map(s=>(
          <div key={s.l} style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:1}}>{s.l}</div></div>
        ))}
      </div>

      {editing&&(
        <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16,marginBottom:16}}>
          {[{k:"name",l:"Prénom",t:"text"},{k:"quote",l:"Citation motivante",t:"text"},{k:"weight",l:"Poids (kg)",t:"number"},{k:"height",l:"Taille (cm)",t:"number"},{k:"age",l:"Âge",t:"number"}].map(f=>(
            <div key={f.k} style={{marginBottom:10}}>
              <label style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontWeight:600}}>{f.l}</label>
              <input type={f.t} value={form[f.k]||""} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={{display:"block",width:"100%",marginTop:4,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            </div>
          ))}
        </div>
      )}

      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📊 Logger le poids</div>
        <div style={{display:"flex",gap:8}}>
          <input type="number" value={nw} onChange={e=>setNw(e.target.value)} placeholder="Ex: 93.5" style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 12px",color:"#fff",fontSize:14,outline:"none"}}/>
          <button onClick={logW} style={{background:"#a8ff78",border:"none",borderRadius:8,padding:"9px 20px",fontWeight:800,color:"#0d0f14",cursor:"pointer",fontSize:13}}>Logger</button>
        </div>
        {diff!==0&&<div style={{marginTop:8,fontSize:13,color:diff<0?"#a8ff78":"#ff8a78",fontWeight:600}}>{diff<0?`▼ ${Math.abs(diff).toFixed(1)} kg perdus`:`▲ ${diff.toFixed(1)} kg pris`} depuis le début</div>}
      </div>

      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📈 Évolution du poids</div>
        <WeightGraph/>
      </div>

      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16,marginBottom:24}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📋 Historique des pesées</div>
        {[...weightHistory].reverse().map((e,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>{e.date===todayKey()?"Aujourd'hui":formatDate(e.date)}</span>
            <span style={{fontSize:13,fontWeight:700,color:"#a8ff78"}}>{e.weight} kg</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState("home");
  const [profile,setProfileState]=useState({name:"Mouad",weight:94,height:179,age:27,quote:"Trust the process"});
  const [dailyLogs,setDailyLogsState]=useState({});
  const [weightHistory,setWeightHistoryState]=useState([{date:todayKey(),weight:94}]);
  const [selectedDay,setSelectedDay]=useState(todayKey());
  const [showPicker,setShowPicker]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const syncQ=useRef({});

  // Auth
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){setUser(session.user);loadData(session.user.id);}
      else setLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user){setUser(session.user);loadData(session.user.id);}
      else{setUser(null);setLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function loadData(uid){
    setLoading(true);
    try{
      const [p,l,w]=await Promise.all([
        sb.from("profiles").select("*").eq("user_id",uid).single(),
        sb.from("daily_logs").select("*").eq("user_id",uid),
        sb.from("weight_history").select("*").eq("user_id",uid).order("date",{ascending:true}),
      ]);
      if(p.data) setProfileState(p.data.data);
      if(l.data){const logs={};l.data.forEach(r=>{logs[r.date]=r.data;});setDailyLogsState(logs);}
      if(w.data&&w.data.length>0) setWeightHistoryState(w.data.map(r=>({date:r.date,weight:r.weight})));
    }catch(e){console.error(e);}
    setDailyLogsState(prev=>{if(!prev[todayKey()]) return{...prev,[todayKey()]:emptyLog()};return prev;});
    setLoading(false);
  }

  function scheduleSync(type,data){
    if(!user) return;
    const key=type+JSON.stringify(data).slice(0,40);
    clearTimeout(syncQ.current[key]);
    syncQ.current[key]=setTimeout(async()=>{
      setSyncing(true);
      try{
        if(type==="profile") await sb.from("profiles").upsert({user_id:user.id,data},{onConflict:"user_id"});
        if(type==="log"){const{date,log}=data;await sb.from("daily_logs").upsert({user_id:user.id,date,data:log},{onConflict:"user_id,date"});}
        if(type==="weight"){const{date,weight}=data;await sb.from("weight_history").upsert({user_id:user.id,date,weight},{onConflict:"user_id,date"});}
      }catch(e){console.error(e);}
      setSyncing(false);
    },1500);
  }

  function setProfile(val){
    const next=typeof val==="function"?val(profile):val;
    setProfileState(next);
    scheduleSync("profile",next);
  }
  function updateLog(day,fn){
    setDailyLogsState(prev=>{
      const cur=prev[day]||emptyLog();
      const updated=fn(cur);
      const next={...prev,[day]:updated};
      if(user) scheduleSync("log",{date:day,log:updated});
      return next;
    });
  }
  function setWeightHistory(val){
    const next=typeof val==="function"?val(weightHistory):val;
    setWeightHistoryState(next);
    if(next.length>0){const last=next[next.length-1];scheduleSync("weight",last);}
  }
  function createDay(day){
    if(!dailyLogs[day]){
      const nl=emptyLog();
      setDailyLogsState(prev=>{const n={...prev,[day]:nl};if(user) scheduleSync("log",{date:day,log:nl});return n;});
    }
    setSelectedDay(day);
  }
  async function signOut(){await sb.auth.signOut();setUser(null);}

  // Toggle sport/repos for today
  function toggleSport(){updateLog(todayKey(),l=>({...l,isSportDay:!l.isSportDay}));}

  if(loading) return(
    <div style={{minHeight:"100vh",background:"#0d0f14",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>🥗</div><div style={{color:"rgba(255,255,255,0.4)",fontSize:14}}>Chargement…</div></div>
    </div>
  );
  if(!user) return <AuthScreen onAuth={u=>{setUser(u);loadData(u.id);}}/>;

  function getLog(day){return dailyLogs[day]||emptyLog();}
  const todayLog=getLog(todayKey());
  const selLog=getLog(selectedDay);

  const NAV=[{id:"home",l:"Accueil",i:"⬡"},{id:"journal",l:"Journal",i:"📓"},{id:"exercise",l:"Exercices",i:"🏋️"},{id:"history",l:"Historique",i:"📅"},{id:"profile",l:"Profil",i:"👤"}];

  return(
    <div style={{minHeight:"100vh",background:"#0d0f14",fontFamily:"'DM Sans','Segoe UI',sans-serif",color:"#fff",maxWidth:480,margin:"0 auto",paddingBottom:80}}>
      {showPicker&&<DayPicker dailyLogs={dailyLogs} selectedDay={selectedDay} onSelect={d=>{setSelectedDay(d);}} onClose={()=>setShowPicker(false)} onCreateDay={d=>{createDay(d);}}/>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1d27,#0d0f14)",padding:"14px 20px 12px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#a8ff78,#78ffd6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:800,color:"#0d0f14"}}>{profile.name[0].toUpperCase()}</div>
            <div>
              <div style={{fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:6}}>
                {profile.name}
                {syncing&&<span style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>↑ sync</span>}
              </div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontStyle:"italic"}}>"{profile.quote||"Trust the process"}"</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <div onClick={()=>setShowPicker(true)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.7)",cursor:"pointer"}}>
              📅 {selectedDay===todayKey()?"Auj.":formatDate(selectedDay)}
            </div>
            <div onClick={toggleSport} style={{background:todayLog.isSportDay!==false?"rgba(168,255,120,0.15)":"rgba(120,180,255,0.15)",border:`1px solid ${todayLog.isSportDay!==false?"#a8ff78":"#78b4ff"}`,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,color:todayLog.isSportDay!==false?"#a8ff78":"#78b4ff",cursor:"pointer"}}>
              {todayLog.isSportDay!==false?"💪":"😴"}
            </div>
          </div>
        </div>
      </div>

      {page==="home"&&<HomePage log={todayLog} setPage={setPage} profile={profile}/>}
      {page==="journal"&&<FoodLoggerPage log={selLog} selectedDay={selectedDay} updateLog={updateLog} setShowPicker={setShowPicker}/>}
      {page==="exercise"&&<ExercisePage log={selLog} selectedDay={selectedDay} updateLog={updateLog} setShowPicker={setShowPicker}/>}
      {page==="history"&&<HistoryPage dailyLogs={dailyLogs} setSelectedDay={setSelectedDay} setPage={setPage} setShowPicker={setShowPicker}/>}
      {page==="profile"&&<ProfilePage profile={profile} setProfile={setProfile} weightHistory={weightHistory} setWeightHistory={setWeightHistory} onSignOut={signOut} userEmail={user.email}/>}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(13,15,20,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",padding:"8px 0 12px"}}>
        {NAV.map(p=>(
          <button key={p.id} onClick={()=>setPage(p.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 2px",color:page===p.id?"#a8ff78":"rgba(255,255,255,0.3)",transition:"color 0.2s"}}>
            <span style={{fontSize:18}}>{p.i}</span>
            <span style={{fontSize:9,fontWeight:600}}>{p.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
