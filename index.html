*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}

.card-hover:active{transform:scale(0.97);}
.btn-press:active{transform:scale(0.95);}
.slide-up{animation:slideUp 0.25s cubic-bezier(.4,0,.2,1) both;}
.fade-in{animation:fadeIn 0.3s ease both;}
.pop-in{animation:popIn 0.3s cubic-bezier(.4,0,.2,1) both;}

.scrollable::-webkit-scrollbar{display:block;width:3px;}

function protIng(key,g){
  const pv=PROTEIN_VARIANTS[key]||PROTEIN_VARIANTS.poulet;
  const kcal=Math.round(g*pv.kcalPer100/100), prot=Math.round(g*pv.protPer100/100);
  const fat=key==="boeuf"?Math.round(g*0.05):key==="thon"?Math.round(g*0.009):Math.round(g*0.018);
  const label=key==="thon"&&g===170?"1 canne de thon (~170g égoutté)":key==="thon"?`${g}g thon`:key==="boeuf"?`${g}g bœuf haché 5% (cru)`:`${g}g poitrine de poulet (cru)`;
  const sub=key==="poulet"?"Épices : ail, paprika, coriandre":key==="boeuf"?"Oignons, ail, sauce tomate":"Citron, poivre, coriandre";
  return [{label,kcal,prot,carbs:0,fat},{label:sub,kcal:0,prot:0,carbs:0,fat:0,note:true}];
}
function carbIng(key){
  if(key==="riz")          return [{label:"80g riz blanc (sec)",      kcal:288,prot:6, carbs:64,fat:1}];

}

function calcFoodMacros(food,amount,unit){
  const a=parseFloat(amount)||0;
  if(!a) return {kcal:0,prot:0,carbs:0,fat:0};
  if(unit==="qty"&&food.perQty) return {kcal:Math.round(food.qtyKcal*a),prot:Math.round(food.qtyProt*a*10)/10,carbs:Math.round(food.qtyCarbs*a*10)/10,fat:Math.round(food.qtyFat*a*10)/10};
  let g=a;
  if(unit==="qty") g=a*(food.qtyG||100);
  else if(unit==="half") g=a*(food.halfG||75);
  else if(unit==="can") g=a*(food.canG||170);
  else if(unit==="tsp") g=a*(food.tspG||5);
  return {kcal:Math.round(g*food.kcal/100),prot:Math.round(g*food.prot/100*10)/10,carbs:Math.round(g*food.carbs/100*10)/10,fat:Math.round(g*food.fat/100*10)/10};
}
function unitLabel(unit,food){
  if(unit==="qty") return food?.name?.includes("Œuf")?"œuf(s)":"unité(s)";
  if(unit==="half") return "½";
  if(unit==="can") return "canne";
  if(unit==="tsp") return "c.thé";
  return unit;
}
function todayKey(){return new Date().toISOString().slice(0,10);}
function formatDate(k){const[y,m,d]=k.split("-");return`${d}/${m}/${y}`;}
function formatDateLong(k){return new Date(k+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});}
function emptyLog(defaultWeight){return{isSportDay:true,proteinKey:"poulet",carbKey:"riz",meals:{},supplements:{},water:0,exercises:[],waterChecks:{},trackingLog:{},weight:defaultWeight||null};}

// Build weight history from all daily logs
function buildWeightHistory(dailyLogs, profileWeight){
  const entries=[];
  Object.entries(dailyLogs).forEach(([date,log])=>{
    if(log.weight!=null) entries.push({date,weight:log.weight});
  });
  return entries.sort((a,b)=>a.date.localeCompare(b.date));
}

function Circle({value,max,size=120,stroke=10,color="#a8ff78",children}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,pct=Math.min(Math.max(value/(max||1),0),1);
  return(
    <div style={{position:"relative",width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width={size} height={size} style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
          style={{transition:"stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1)",strokeLinecap:"round",filter:`drop-shadow(0 0 6px ${color}55)`}}/>
      </svg>
      <div style={{zIndex:1,textAlign:"center"}}>{children}</div>
    </div>
  );
}

// REST TIMER
// ══════════════════════════════════════════════════════
function RestTimer(){
  const [active,setActive]=useState(false);
  const [total,setTotal]=useState(90);
  const [remaining,setRemaining]=useState(90);
  const [done,setDone]=useState(false);
  const iv=useRef(null);
  function start(s){clearInterval(iv.current);setTotal(s);setRemaining(s);setActive(true);setDone(false);iv.current=setInterval(()=>setRemaining(r=>{if(r<=1){clearInterval(iv.current);setActive(false);setDone(true);return 0;}return r-1;}),1000);}
  function stop(){clearInterval(iv.current);setActive(false);setRemaining(total);setDone(false);}
  const m=Math.floor(remaining/60),s=remaining%60;
  return(
    <div style={{background:"linear-gradient(135deg,rgba(168,255,120,0.05),rgba(120,200,255,0.03))",border:"1px solid rgba(168,255,120,0.1)",borderRadius:18,padding:"14px 16px",marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:"rgba(255,255,255,0.7)"}}>⏱ Rest Timer</div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <Circle value={total-remaining} max={total} size={70} stroke={6} color={done?"#ff8a78":active?"#a8ff78":"rgba(255,255,255,0.1)"}>
          <div style={{fontSize:done?9:13,fontWeight:800,color:done?"#ff8a78":active?"#a8ff78":"rgba(255,255,255,0.3)"}}>
            {done?"DONE!":active?`${m}:${String(s).padStart(2,"0")}`:"REST"}
          </div>
        </Circle>
        <div style={{flex:1}}>
          <div style={{display:"flex",gap:5,marginBottom:8}}>
            {[60,90,120,180].map(sec=>(
              <button key={sec} onClick={()=>start(sec)} style={{flex:1,padding:"6px 2px",borderRadius:8,border:`1px solid ${active&&total===sec?"#a8ff78":"rgba(255,255,255,0.08)"}`,background:active&&total===sec?"rgba(168,255,120,0.12)":"rgba(255,255,255,0.03)",color:active&&total===sec?"#a8ff78":"rgba(255,255,255,0.5)",fontWeight:700,cursor:"pointer",fontSize:11}}>
                {sec<60?`${sec}s`:`${sec/60}m`}
              </button>
            ))}
          </div>
          {active&&<button onClick={stop} style={{width:"100%",padding:"7px",borderRadius:8,border:"1px solid rgba(255,80,80,0.25)",background:"rgba(255,80,80,0.07)",color:"#ff8a78",fontWeight:700,cursor:"pointer",fontSize:12}}>✕ Stop</button>}
          {done&&<button onClick={()=>setDone(false)} style={{width:"100%",padding:"7px",borderRadius:8,border:"1px solid rgba(168,255,120,0.3)",background:"rgba(168,255,120,0.1)",color:"#a8ff78",fontWeight:700,cursor:"pointer",fontSize:12}}>✓ C'est parti !</button>}
          {!active&&!done&&<div style={{fontSize:11,color:"rgba(255,255,255,0.2)",textAlign:"center",paddingTop:4}}>Appuie pour démarrer</div>}
        </div>
      </div>
    </div>
  );
}

// NUTRITION PAGE

function NutritionPage({log,selectedDay,updateLog,setShowPicker,mealPlan}){
  const isToday=selectedDay===todayKey();
  const isSport=log.isSportDay!==false;
  const done=mealPlan.filter(m=>log.meals?.[m.id]);
  const totalK=done.reduce((s,m)=>s+m.kcal,0),maxK=mealPlan.reduce((s,m)=>s+m.kcal,0);
  const totalP=done.reduce((s,m)=>s+m.prot,0),totalC=done.reduce((s,m)=>s+m.carbs,0),totalF=done.reduce((s,m)=>s+(m.fat||0),0);

  return(
    <div style={{padding:"20px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

      </div>

      {/* Sport / Repos */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {["sport","repos"].map(t=>(
          <button key={t} onClick={()=>updateLog(selectedDay,l=>({...l,isSportDay:t==="sport"}))} style={{flex:1,padding:"9px",borderRadius:12,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,transition:"all 0.2s",background:(t==="sport"?isSport:!isSport)?(t==="sport"?"#a8ff78":"#78b4ff"):"rgba(255,255,255,0.06)",color:(t==="sport"?isSport:!isSport)?"#0a0c12":"rgba(255,255,255,0.4)"}}>
            {t==="sport"?"💪 Jour de sport":"😴 Jour de repos"}
          </button>
        ))}
      </div>

      {/* Variants */}
      {isSport&&(
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:16,padding:"14px 16px",marginBottom:16,border:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:"rgba(255,255,255,0.7)"}}>🔄 Variantes du jour</div>
          <VariantPicker title="🥩 Protéine principale" variants={PROTEIN_VARIANTS} currentKey={log.proteinKey||"poulet"} onSelect={k=>updateLog(selectedDay,l=>({...l,proteinKey:k,meals:{}}))}/>
          <VariantPicker title="🍚 Glucides post-workout" variants={CARB_VARIANTS} currentKey={log.carbKey||"riz"} onSelect={k=>updateLog(selectedDay,l=>({...l,carbKey:k,meals:{}}))}/>

        </div>

      {/* Macro summary */}
      <div style={{display:"flex",gap:6,marginBottom:20}}>

          <div key={s.l} style={{flex:1,background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 6px",textAlign:"center",border:"1px solid rgba(255,255,255,0.05)"}}>

                {log.meals?.[meal.id]?"✓":""}
              </div>
            </div>
          </div>
          <MealItems items={meal.items}/>
        </div>
      ))}

      {/* Supplements */}
      <h3 style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,margin:"20px 0 12px"}}>💊 Suppléments</h3>
      {SUPPLEMENTS.map(s=>(
        <div key={s.id} onClick={()=>updateLog(selectedDay,l=>({...l,supplements:{...l.supplements,[s.id]:!l.supplements?.[s.id]}}))} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:log.supplements?.[s.id]?"rgba(168,255,120,0.05)":"rgba(255,255,255,0.02)",border:`1px solid ${log.supplements?.[s.id]?"rgba(168,255,120,0.2)":"rgba(255,255,255,0.05)"}`,borderRadius:12,marginBottom:8,cursor:"pointer",transition:"all 0.2s"}}>
          <span style={{fontSize:22}}>{s.emoji}</span>

      ))}

      {/* Water */}
      <h3 style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,margin:"20px 0 12px"}}>💧 Eau</h3>
      <div style={{background:"rgba(120,200,255,0.04)",border:"1px solid rgba(120,200,255,0.1)",borderRadius:16,padding:16,marginBottom:24}}>

            <button onClick={()=>updateLog(selectedDay,l=>({...l,water:Math.max(0,(l.water||0)-1)}))} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:18}}>−</button>
            <button onClick={()=>updateLog(selectedDay,l=>({...l,water:Math.min(8,(l.water||0)+1)}))} style={{background:"rgba(120,200,255,0.12)",border:"none",borderRadius:8,color:"#78c8ff",width:32,height:32,cursor:"pointer",fontSize:18,fontWeight:800}}>+</button>
          </div>
        </div>
        <div style={{display:"flex",gap:5}}>
          {Array.from({length:8}).map((_,i)=>(
            <div key={i} onClick={()=>updateLog(selectedDay,l=>({...l,water:i<(l.water||0)?i:i+1}))} style={{flex:1,height:30,borderRadius:8,cursor:"pointer",background:i<(log.water||0)?"#78c8ff":"rgba(255,255,255,0.05)",transition:"all 0.2s",display:"flex",alignItems:"center",justifyContent:"center"}}>

          ))}
        </div>
      </div>
    </div>
  );
}

// TRACKING PAGE
// ══════════════════════════════════════════════════════
function TrackingPage({log,selectedDay,updateLog,setShowPicker}){
  const isToday=selectedDay===todayKey();
  const [activeSlot,setActiveSlot]=useState(null);
  const [search,setSearch]=useState("");
  const [pendingFood,setPendingFood]=useState(null);
  const [amount,setAmount]=useState("");
  const [unit,setUnit]=useState("");
  const searchRef=useRef(null);

  const trackingLog=log.trackingLog||{};
  const allItems=Object.values(trackingLog).flat();
  const totalKcal=allItems.reduce((s,it)=>s+it.kcal,0);
  const totalProt=Math.round(allItems.reduce((s,it)=>s+it.prot,0));
  const totalCarbs=Math.round(allItems.reduce((s,it)=>s+it.carbs,0));
  const totalFat=Math.round(allItems.reduce((s,it)=>s+it.fat,0));

  const sq=search.toLowerCase().trim();
  const filtered=sq?FOOD_DB.filter(f=>f.name.toLowerCase().includes(sq)||f.cat.toLowerCase().includes(sq)):[];

  function selectFood(food){
    setPendingFood(food);setUnit(food.defaultUnit);
    if(food.defaultUnit==="qty")setAmount("1");
    else if(food.defaultUnit==="half")setAmount("1");
    else if(food.defaultUnit==="can")setAmount("1");
    else if(food.defaultUnit==="tsp")setAmount("1");
    else if(food.id==="blancs_oeuf")setAmount("150");
    else setAmount("100");
    setSearch("");
  }

  function addItem(){
    if(!pendingFood||!amount||!activeSlot)return;
    const macros=calcFoodMacros(pendingFood,amount,unit);
    if(macros.kcal===0&&macros.prot===0)return;
    const entry={id:Date.now(),foodId:pendingFood.id,name:pendingFood.name,amount:parseFloat(amount),unit,...macros};
    updateLog(selectedDay,l=>{const tl=l.trackingLog||{};return{...l,trackingLog:{...tl,[activeSlot]:[...(tl[activeSlot]||[]),entry]}};});
    setPendingFood(null);setAmount("");
    if(searchRef.current)searchRef.current.focus();
  }

  function removeItem(slotId,itemId){
    updateLog(selectedDay,l=>({...l,trackingLog:{...l.trackingLog,[slotId]:(l.trackingLog?.[slotId]||[]).filter(it=>it.id!==itemId)}}));
  }

  const preview=pendingFood&&parseFloat(amount)>0?calcFoodMacros(pendingFood,parseFloat(amount),unit):null;

  if(activeSlot){
    const slot=MEAL_SLOTS.find(s=>s.id===activeSlot);
    const slotItems=trackingLog[activeSlot]||[];
    const slotKcal=slotItems.reduce((s,it)=>s+it.kcal,0);
    return(
      <div style={{padding:"20px 20px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <button onClick={()=>{setActiveSlot(null);setPendingFood(null);setSearch("");}} style={{background:"rgba(255,255,255,0.06)",border:"none",borderRadius:10,color:"rgba(255,255,255,0.7)",padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>← Retour</button>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:17}}>{slot.emoji} {slot.label}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{slotKcal} kcal · {slotItems.length} aliment(s)</div>
          </div>
        </div>

        {slotItems.length>0&&(
          <div style={{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"12px 14px",marginBottom:14,border:"1px solid rgba(255,255,255,0.05)"}}>
            {slotItems.map(it=>{
              const f=FOOD_DB.find(fd=>fd.id===it.foodId);
              return(
                <div key={it.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600}}>{it.name}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{it.amount} {unitLabel(it.unit,f)}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <MacroPill kcal={it.kcal} prot={it.prot} carbs={it.carbs} fat={it.fat}/>
                    <button onClick={()=>removeItem(activeSlot,it.id)} style={{background:"rgba(255,80,80,0.08)",border:"none",borderRadius:6,color:"#ff5050",width:22,height:22,cursor:"pointer",fontSize:13,flexShrink:0}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <input ref={searchRef} value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="🔍 Chercher un aliment…"
          style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"12px 16px",color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8}}/>

        {sq&&(
          <div style={{background:"#10131d",borderRadius:12,border:"1px solid rgba(255,255,255,0.07)",marginBottom:10,maxHeight:180,overflowY:"auto"}}>
            {filtered.length===0&&<div style={{padding:"12px 16px",fontSize:13,color:"rgba(255,255,255,0.25)"}}>Aucun résultat</div>}
            {filtered.map(f=>(
              <div key={f.id} onClick={()=>selectFood(f)} style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center",background:pendingFood?.id===f.id?"rgba(168,255,120,0.06)":"transparent"}}>
                <div><div style={{fontSize:13,fontWeight:600}}>{f.name}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>{f.cat}</div></div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{f.kcal}/100{f.defaultUnit==="ml"?"ml":"g"}</div>
              </div>
            ))}
          </div>
        )}

        {pendingFood&&(
          <div className="slide-up" style={{background:"rgba(168,255,120,0.04)",border:"1px solid rgba(168,255,120,0.12)",borderRadius:14,padding:"14px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontWeight:700,fontSize:13}}>{pendingFood.name}</span>
              <button onClick={()=>setPendingFood(null)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.35)",fontSize:16,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:preview&&preview.kcal>0?10:0}}>
              <input type="number" value={amount} onChange={e=>setAmount(e.target.value)}
                placeholder="Quantité" autoFocus
                style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:15,outline:"none"}}/>
              <select value={unit} onChange={e=>setUnit(e.target.value)}
                style={{background:"#10131d",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,outline:"none",minWidth:72}}>
                {pendingFood.units.map(u=>(
                  <option key={u} value={u} style={{background:"#10131d"}}>
                    {u==="qty"?(pendingFood.name.includes("Œuf")?"œuf(s)":"unité(s)"):u==="half"?"½ avoc.":u==="can"?"canne":u==="tsp"?"c.thé":u}
                  </option>
                ))}
              </select>
            </div>
            {preview&&preview.kcal>0&&(
              <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px",marginBottom:10}}>
                <MacroPill kcal={preview.kcal} prot={preview.prot} carbs={preview.carbs} fat={preview.fat}/>
              </div>
            )}
            <button onClick={addItem} style={{width:"100%",background:"#a8ff78",border:"none",borderRadius:10,padding:"11px",fontWeight:800,fontSize:14,color:"#0a0c12",cursor:"pointer"}}>
              + Ajouter à {slot.label}
            </button>
          </div>
        )}

        {!sq&&!pendingFood&&(()=>{
          const cats=[...new Set(FOOD_DB.map(f=>f.cat))];
          return cats.map(cat=>(
            <div key={cat} style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.3)",marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>{cat}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {FOOD_DB.filter(f=>f.cat===cat).map(f=>(
                  <button key={f.id} onClick={()=>selectFood(f)} style={{padding:"6px 12px",borderRadius:20,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.55)",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                    {f.name}
                  </button>
                ))}
              </div>
            </div>
          ));
        })()}
      </div>
    );
  }

  return(
    <div style={{padding:"20px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,margin:0}}>📓 Tracking Manuel</h2>
        <button onClick={()=>setShowPicker(true)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"6px 12px",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.6)",cursor:"pointer"}}>📅 {isToday?"Aujourd'hui":formatDate(selectedDay)} ▾</button>
      </div>

      {allItems.length>0&&(
        <div style={{background:"linear-gradient(135deg,rgba(120,200,255,0.07),rgba(120,200,255,0.02))",border:"1px solid rgba(120,200,255,0.12)",borderRadius:16,padding:"14px 16px",marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.35)",marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Total du jour (tracking)</div>
          <div style={{display:"flex",gap:6}}>
            {[{l:"Kcal",v:totalKcal,c:"#78c8ff"},{l:"Prot.",v:`${totalProt}g`,c:"#ff9f78"},{l:"Carbs",v:`${totalCarbs}g`,c:"#a8e8ff"},{l:"Lip.",v:`${totalFat}g`,c:"#ffd4a8"}].map(s=>(
              <div key={s.l} style={{flex:1,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"9px 6px",textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:800,color:s.c,fontFamily:"'Syne',sans-serif"}}>{s.v}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {MEAL_SLOTS.map(slot=>{
        const items=trackingLog[slot.id]||[];
        const slotKcal=items.reduce((s,it)=>s+it.kcal,0);
        return(
          <div key={slot.id} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:16,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:items.length>0?10:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{slot.emoji}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>{slot.label}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>⏰ {slot.time}</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {items.length>0&&<span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{slotKcal} kcal</span>}
                <button onClick={()=>setActiveSlot(slot.id)} style={{background:"#a8ff78",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:700,fontSize:12,color:"#0a0c12",cursor:"pointer"}}>+ Add</button>
              </div>
            </div>
            {items.map(it=>{
              const f=FOOD_DB.find(fd=>fd.id===it.foodId);
              return(
                <div key={it.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>{it.name}</span>
                    <span style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginLeft:6}}>{it.amount} {unitLabel(it.unit,f)}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <MacroPill kcal={it.kcal} prot={it.prot} carbs={it.carbs} fat={it.fat}/>
                    <button onClick={()=>removeItem(slot.id,it.id)} style={{background:"rgba(255,80,80,0.08)",border:"none",borderRadius:6,color:"#ff5050",width:22,height:22,cursor:"pointer",fontSize:13,flexShrink:0}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// EXERCISE PAGE
// ══════════════════════════════════════════════════════
function ExercisePage({log,selectedDay,updateLog,setShowPicker}){
  const [exSearch,setExSearch]=useState("");
  const [customName,setCustomName]=useState("");
  const [expanded,setExpanded]=useState(null);
  const [showSugg,setShowSugg]=useState(false);
  const exercises=log.exercises||[];
  const isToday=selectedDay===todayKey();

  function searchEx(q){
    if(!q)return[];
    const ql=q.toLowerCase();
    const muscleFirst=EXERCISE_DB.filter(e=>e.muscle.toLowerCase()===ql||e.muscle.toLowerCase().startsWith(ql));
    const nameOnly=EXERCISE_DB.filter(e=>e.name.toLowerCase().includes(ql)&&!muscleFirst.includes(e));
    return[...muscleFirst,...nameOnly].slice(0,12);
  }
  const suggestions=searchEx(exSearch);

  function addExercise(name,muscle){
    const id=Date.now();
    updateLog(selectedDay,l=>({...l,exercises:[...(l.exercises||[]),{id,name,muscle:muscle||"",sets:[],note:"",unit:"lbs"}]}));
    setExSearch("");setCustomName("");setShowSugg(false);setExpanded(id);
  }
  function addCustom(){if(customName.trim())addExercise(customName.trim(),"");}
  function addSet(id){updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,sets:[...ex.sets,{reps:"",weight:""}]}:ex)}));}
  function updateSet(id,si,f,v){updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,sets:ex.sets.map((s,i)=>i===si?{...s,[f]:v}:s)}:ex)}));}
  function deleteSet(id,si){updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,sets:ex.sets.filter((_,i)=>i!==si)}:ex)}));}
  function deleteEx(id){updateLog(selectedDay,l=>({...l,exercises:l.exercises.filter(ex=>ex.id!==id)}));if(expanded===id)setExpanded(null);}
  function updateNote(id,note){updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,note}:ex)}));}
  function toggleUnit(id){updateLog(selectedDay,l=>({...l,exercises:l.exercises.map(ex=>ex.id===id?{...ex,unit:ex.unit==="kg"?"lbs":"kg"}:ex)}));}

  return(
    <div style={{padding:"20px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,margin:0}}>🏋️ Exercices</h2>
        <button onClick={()=>setShowPicker(true)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"6px 12px",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.6)",cursor:"pointer"}}>📅 {isToday?"Aujourd'hui":formatDate(selectedDay)} ▾</button>
      </div>

      <RestTimer/>

      <div style={{position:"relative",marginBottom:8}}>
        <input value={exSearch} onChange={e=>{setExSearch(e.target.value);setShowSugg(true);}}
          onFocus={()=>setShowSugg(true)}
          placeholder="Chercher un exercice ou muscle (ex: chest, back)…"
          style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"11px 14px",color:"#fff",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
        {showSugg&&suggestions.length>0&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#10131d",borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",zIndex:10,maxHeight:220,overflowY:"auto",marginTop:4}}>
            {suggestions.map((ex,i)=>(
              <div key={i} onClick={()=>addExercise(ex.name,ex.muscle)} style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,fontWeight:600}}>{ex.name}</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"2px 7px"}}>{ex.muscle}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <input value={customName} onChange={e=>setCustomName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustom()}
          placeholder="Ou saisir un exercice personnalisé…"
          style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,outline:"none"}}/>
        <button onClick={addCustom} style={{background:"#a8ff78",border:"none",borderRadius:10,padding:"10px 18px",fontWeight:800,fontSize:13,color:"#0a0c12",cursor:"pointer",whiteSpace:"nowrap"}}>+ Ajouter</button>
      </div>

      {exercises.length===0&&<div style={{textAlign:"center",color:"rgba(255,255,255,0.18)",fontSize:14,padding:"30px 0"}}>{isToday?"Lance ta séance !":"Aucun exercice ce jour-là"}</div>}

      {exercises.map(ex=>{
        const unit=ex.unit||"lbs";
        const totalVol=ex.sets.reduce((s,st)=>{const r=parseInt(st.reps)||0,w=parseFloat(st.weight)||0;return s+r*(unit==="kg"?w*KG_TO_LBS:w);},0);
        return(
          <div key={ex.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,marginBottom:12,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",padding:"13px 16px",cursor:"pointer",gap:10}} onClick={()=>setExpanded(expanded===ex.id?null:ex.id)}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}}>{ex.name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",display:"flex",gap:8}}>
                  {ex.muscle&&<span style={{color:"rgba(168,255,120,0.5)"}}>{ex.muscle}</span>}
                  <span>{ex.sets.length} série(s) · {ex.sets.reduce((s,st)=>s+(parseInt(st.reps)||0),0)} reps</span>
                  {totalVol>0&&<span style={{color:"#a8ff78"}}>· {Math.round(totalVol)} lbs</span>}
                </div>
              </div>
              <div onClick={e=>{e.stopPropagation();toggleUnit(ex.id);}} style={{background:unit==="kg"?"rgba(255,200,120,0.12)":"rgba(120,200,255,0.1)",border:`1px solid ${unit==="kg"?"#ffc878":"#78c8ff"}`,borderRadius:10,padding:"3px 8px",fontSize:10,fontWeight:700,color:unit==="kg"?"#ffc878":"#78c8ff",cursor:"pointer"}}>{unit.toUpperCase()}</div>
              <span style={{fontSize:16,color:"rgba(255,255,255,0.2)"}}>{expanded===ex.id?"▾":"▸"}</span>
              <button onClick={e=>{e.stopPropagation();deleteEx(ex.id);}} style={{background:"rgba(255,80,80,0.08)",border:"none",borderRadius:6,color:"#ff5050",padding:"4px 8px",cursor:"pointer",fontSize:11}}>✕</button>
            </div>
            {expanded===ex.id&&(
              <div style={{padding:"0 16px 14px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{display:"flex",gap:6,fontSize:10,color:"rgba(255,255,255,0.25)",fontWeight:700,marginBottom:8,marginTop:12}}>
                  <div style={{width:44}}>SÉRIE</div><div style={{flex:1}}>REPS</div><div style={{flex:1}}>POIDS ({unit})</div><div style={{width:28}}></div>
                </div>
                {ex.sets.map((set,si)=>{
                  const w=parseFloat(set.weight)||0;
                  const lbsNote=w&&unit==="kg"?` = ${(w*KG_TO_LBS).toFixed(1)} lbs`:"";
                  return(
                    <div key={si} style={{marginBottom:8}}>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <div style={{width:44,fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:700}}>S{si+1}</div>
                        <input value={set.reps} onChange={e=>updateSet(ex.id,si,"reps",e.target.value)} placeholder="10" style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"8px 10px",color:"#fff",fontSize:13,outline:"none"}}/>
                        <input value={set.weight} onChange={e=>updateSet(ex.id,si,"weight",e.target.value)} placeholder={unit} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"8px 10px",color:"#fff",fontSize:13,outline:"none"}}/>
                        <button onClick={()=>deleteSet(ex.id,si)} style={{width:28,height:34,background:"rgba(255,80,80,0.08)",border:"none",borderRadius:6,color:"#ff5050",cursor:"pointer",fontSize:14}}>✕</button>
                      </div>
                      {lbsNote&&<div style={{fontSize:9,color:"#ffc878",paddingLeft:50,marginTop:2}}>{lbsNote}</div>}
                    </div>
                  );
                })}
                <button onClick={()=>addSet(ex.id)} style={{width:"100%",background:"rgba(168,255,120,0.05)",border:"1px dashed rgba(168,255,120,0.2)",borderRadius:8,padding:"9px",color:"#a8ff78",cursor:"pointer",fontSize:12,fontWeight:600,marginTop:4}}>+ Série</button>
                {ex.sets.length>0&&(
                  <div style={{background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"8px 10px",marginTop:10,border:"1px solid rgba(255,255,255,0.04)"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.35)",marginBottom:4}}>Résumé</div>
                    {ex.sets.map((set,si)=>{
                      const r=parseInt(set.reps)||0,w=parseFloat(set.weight)||0;
                      const wLbs=unit==="kg"?w*KG_TO_LBS:w;
                      return(<div key={si} style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:2}}>S{si+1}: {r} reps × {wLbs>0?`${wLbs.toFixed(unit==="kg"?1:0)} lbs`:"-"}{unit==="kg"&&w>0?` (${w} kg)`:""}</div>);
                    })}
                    {totalVol>0&&<div style={{fontSize:11,color:"#a8ff78",fontWeight:700,marginTop:4,borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:4}}>Volume total : {Math.round(totalVol)} lbs</div>}
                  </div>
                )}
                <textarea value={ex.note||""} onChange={e=>updateNote(ex.id,e.target.value)} placeholder="Notes…" rows={2} style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"8px 10px",color:"rgba(255,255,255,0.5)",fontSize:12,resize:"none",marginTop:10,outline:"none",boxSizing:"border-box"}}/>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// HISTORY PAGE
// ══════════════════════════════════════════════════════
function HistoryPage({dailyLogs,setSelectedDay,setPage,setShowPicker}){
  const days=Object.keys(dailyLogs).sort().reverse();
  return(
    <div style={{padding:"20px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,margin:0}}>📅 Historique</h2>
        <button onClick={()=>setShowPicker(true)} style={{background:"#a8ff78",border:"none",borderRadius:20,padding:"7px 14px",fontSize:12,fontWeight:800,color:"#0a0c12",cursor:"pointer"}}>🗓 Calendrier</button>
      </div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:18}}>{days.length} jour(s) enregistré(s)</div>
      {days.map(day=>{
        const log=dailyLogs[day];
        const mp=buildMealPlan(log.isSportDay!==false,log.proteinKey||"poulet",log.carbKey||"riz");
        const planKcal=mp.filter(m=>log.meals?.[m.id]).reduce((s,m)=>s+m.kcal,0);
        const trackKcal=Object.values(log.trackingLog||{}).flat().reduce((s,it)=>s+it.kcal,0);
        const isT=day===todayKey();
        return(
          <div key={day} className="card-hover" style={{background:isT?"rgba(168,255,120,0.03)":"rgba(255,255,255,0.02)",border:`1px solid ${isT?"rgba(168,255,120,0.15)":"rgba(255,255,255,0.05)"}`,borderRadius:16,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:6}}>
                  {isT?"Aujourd'hui":formatDateLong(day)}
                  {isT&&<span style={{fontSize:9,background:"#a8ff78",color:"#0a0c12",padding:"1px 6px",borderRadius:8,fontWeight:800}}>TODAY</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
                  <div style={{fontSize:11,color:log.isSportDay!==false?"#a8ff78":"#78b4ff"}}>{log.isSportDay!==false?"💪 Sport":"😴 Repos"}</div>
                  {log.weight&&<div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>⚖️ {log.weight} kg</div>}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:"#a8ff78"}}>{planKcal+trackKcal} kcal</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>Plan: {planKcal} · Track: {trackKcal}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
              {[{l:`💊 ${SUPPLEMENTS.filter(s=>log.supplements?.[s.id]).length}/4`,c:"#d8a8ff"},{l:`💧 ${log.water||0}/8`,c:"#78c8ff"},{l:`🏋️ ${log.exercises?.length||0}ex`,c:"#ffa878"}].map(s=><div key={s.l} style={{fontSize:10,color:s.c,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"3px 8px",fontWeight:600}}>{s.l}</div>)}
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setSelectedDay(day);setPage("nutrition");}} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"none",borderRadius:8,padding:"7px",color:"rgba(255,255,255,0.55)",cursor:"pointer",fontSize:11,fontWeight:600}}>📋 Plan</button>
              <button onClick={()=>{setSelectedDay(day);setPage("tracking");}} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"none",borderRadius:8,padding:"7px",color:"rgba(255,255,255,0.55)",cursor:"pointer",fontSize:11,fontWeight:600}}>📓 Tracking</button>
              <button onClick={()=>{setSelectedDay(day);setPage("exercise");}} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"none",borderRadius:8,padding:"7px",color:"rgba(255,255,255,0.55)",cursor:"pointer",fontSize:11,fontWeight:600}}>🏋️ Exercices</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// PROFILE PAGE — with per-day weight + full graph
// ══════════════════════════════════════════════════════
function ProfilePage({profile,setProfile,dailyLogs,updateLog,selectedDay,setShowPicker,onSignOut,userEmail}){
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({...profile});

  // Weight history built from daily logs
  const weightHistory=buildWeightHistory(dailyLogs,profile.weight);
  const isToday=selectedDay===todayKey();

  function save(){setProfile({...form,weight:parseFloat(form.weight)||profile.weight});setEditing(false);}

  // Inline weight edit for selected day
  const [editingWeight,setEditingWeight]=useState(false);
  const [wVal,setWVal]=useState("");

  function startWeightEdit(){
    const cur=dailyLogs[selectedDay]?.weight;
    setWVal(cur!=null?String(cur):String(profile.weight||""));
    setEditingWeight(true);
  }
  function saveWeight(){
    const w=parseFloat(wVal);
    if(!w||isNaN(w)){setEditingWeight(false);return;}
    updateLog(selectedDay,l=>({...l,weight:w}));
    if(isToday) setProfile(p=>({...p,weight:w}));
    setEditingWeight(false);
  }

  const currentWeight=dailyLogs[selectedDay]?.weight||profile.weight;
  const startWeight=weightHistory[0]?.weight||profile.weight;
  const totalDiff=currentWeight-startWeight;
  const bmi=(currentWeight/((profile.height/100)**2)).toFixed(1);

  function WeightGraph(){
    if(weightHistory.length<2) return(
      <div style={{textAlign:"center",padding:"24px",color:"rgba(255,255,255,0.25)",fontSize:13}}>
        Ajoute ton poids sur plusieurs jours pour voir ta courbe 📈
      </div>
    );
    const W=320,H=140,p={t:16,r:16,b:28,l:40};
    const data=weightHistory.slice(-30);
    const ws=data.map(d=>d.weight);
    const minW=Math.min(...ws)-0.5,maxW=Math.max(...ws)+0.5;
    const range=maxW-minW||1;
    const xs=i=>p.l+i*(W-p.l-p.r)/Math.max(data.length-1,1);
    const ys=v=>H-p.b-((v-minW)/range)*(H-p.t-p.b);
    const pts=data.map((d,i)=>`${xs(i)},${ys(d.weight)}`).join(" ");
    const area=`${xs(0)},${H-p.b} `+pts+` ${xs(data.length-1)},${H-p.b}`;
    const trend=data.length>1?(data[data.length-1].weight-data[0].weight)<0;
    const lineColor=trend?"#a8ff78":"#ff8a78";
    return(
      <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
        <defs>
          <linearGradient id="wgg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={lineColor} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={lineColor} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {[minW,(minW+maxW)/2,maxW].map((v,i)=>(
          <g key={i}>
            <line x1={p.l} y1={ys(v)} x2={W-p.r} y2={ys(v)} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
            <text x={p.l-4} y={ys(v)+3} textAnchor="end" fontSize="8" fill="rgba(255,255,255,0.25)">{v.toFixed(1)}</text>
          </g>
        ))}
        <polygon points={area} fill="url(#wgg)"/>
        <polyline points={pts} fill="none" stroke={lineColor} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" style={{filter:`drop-shadow(0 0 4px ${lineColor}66)`}}/>
        {data.map((d,i)=>{
          const show=i===0||i===data.length-1||i%Math.ceil(data.length/5)===0;
          return(
            <g key={i}>
              <circle cx={xs(i)} cy={ys(d.weight)} r={i===data.length-1?4.5:3} fill={lineColor} opacity={i===data.length-1?1:0.6}/>
              {show&&<text x={xs(i)} y={H-8} textAnchor="middle" fontSize="7" fill="rgba(255,255,255,0.22)">{formatDate(d.date).slice(0,5)}</text>}
            </g>
          );
        })}
      </svg>
    );
  }

  return(
    <div style={{padding:"20px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,margin:0}}>👤 Profil</h2>
        <button onClick={()=>editing?save():setEditing(true)} style={{background:editing?"#a8ff78":"rgba(255,255,255,0.07)",border:"none",borderRadius:10,padding:"8px 16px",color:editing?"#0a0c12":"rgba(255,255,255,0.7)",fontWeight:700,cursor:"pointer",fontSize:13}}>{editing?"✓ Sauvegarder":"✏️ Modifier"}</button>
      </div>

      {/* Account */}
      <div style={{background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"10px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",border:"1px solid rgba(255,255,255,0.05)"}}>
        <div><div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>Connecté avec</div><div style={{fontSize:12,color:"rgba(255,255,255,0.55)",marginTop:1}}>{userEmail}</div></div>
        <button onClick={onSignOut} style={{background:"rgba(255,80,80,0.08)",border:"1px solid rgba(255,80,80,0.18)",borderRadius:10,padding:"6px 12px",color:"#ff8a78",fontWeight:700,cursor:"pointer",fontSize:12}}>Déconnexion</button>
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {[{l:"Poids actuel",v:`${currentWeight} kg`,c:"#a8ff78"},{l:"IMC",v:bmi,c:"#ffa878"},{l:"Taille",v:`${profile.height} cm`,c:"#78c8ff"},{l:"Âge",v:`${profile.age} ans`,c:"#d8a8ff"}].map(s=>(
          <div key={s.l} style={{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"14px",border:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Edit form */}
      {editing&&(
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:16,padding:16,marginBottom:16,border:"1px solid rgba(255,255,255,0.06)"}}>
          {[{k:"name",l:"Prénom",t:"text"},{k:"quote",l:"Citation motivante",t:"text"},{k:"weight",l:"Poids de référence (kg)",t:"number"},{k:"height",l:"Taille (cm)",t:"number"},{k:"age",l:"Âge",t:"number"}].map(f=>(
            <div key={f.k} style={{marginBottom:10}}>
              <label style={{fontSize:11,color:"rgba(255,255,255,0.35)",fontWeight:600}}>{f.l}</label>
              <input type={f.t} value={form[f.k]||""} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={{display:"block",width:"100%",marginTop:4,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            </div>
          ))}
        </div>
      )}

      {/* ── PER-DAY WEIGHT EDITOR ── */}
      <div style={{background:"linear-gradient(135deg,rgba(168,255,120,0.05),rgba(168,255,120,0.02))",borderRadius:18,padding:18,marginBottom:16,border:"1px solid rgba(168,255,120,0.1)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,marginBottom:2}}>⚖️ Poids du jour sélectionné</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{isToday?"Aujourd'hui":formatDateLong(selectedDay)}</div>
          </div>
          <button onClick={()=>setShowPicker(true)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:10,padding:"5px 10px",fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.5)",cursor:"pointer"}}>📅 Changer</button>
        </div>

        {editingWeight?(
          <div className="slide-up">
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input type="number" value={wVal} onChange={e=>setWVal(e.target.value)} autoFocus
                onKeyDown={e=>e.key==="Enter"&&saveWeight()}
                style={{flex:1,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(168,255,120,0.3)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:18,fontWeight:700,outline:"none",textAlign:"center"}}/>
              <span style={{display:"flex",alignItems:"center",color:"rgba(255,255,255,0.4)",fontSize:14}}>kg</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditingWeight(false)} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"none",borderRadius:10,padding:"10px",color:"rgba(255,255,255,0.4)",fontWeight:700,cursor:"pointer",fontSize:13}}>Annuler</button>
              <button onClick={saveWeight} style={{flex:2,background:"#a8ff78",border:"none",borderRadius:10,padding:"10px",color:"#0a0c12",fontWeight:800,cursor:"pointer",fontSize:14}}>✓ Enregistrer</button>
            </div>
          </div>
        ):(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:32,fontWeight:900,color:dailyLogs[selectedDay]?.weight?"#a8ff78":"rgba(255,255,255,0.3)"}}>
              {dailyLogs[selectedDay]?.weight!=null?`${dailyLogs[selectedDay].weight} kg`:"—"}
            </div>
            <button onClick={startWeightEdit} style={{background:"rgba(168,255,120,0.12)",border:"1px solid rgba(168,255,120,0.25)",borderRadius:12,padding:"8px 16px",color:"#a8ff78",fontWeight:700,cursor:"pointer",fontSize:13}}>
              {dailyLogs[selectedDay]?.weight?"✏️ Modifier":"+ Logger"}
            </button>
          </div>
        )}

        {/* Quick presets for common past dates */}
        {!editingWeight&&(
          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Accès rapide — jours récents sans poids</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Array.from({length:7},(_,i)=>{
                const d=new Date();d.setDate(d.getDate()-i-1);
                const dk=d.toISOString().slice(0,10);
                const hasLog=!!dailyLogs[dk];
                const hasWeight=dailyLogs[dk]?.weight!=null;
                if(!hasLog||hasWeight)return null;
                return(
                  <button key={dk} onClick={()=>{/* select that day */setShowPicker(true);}} style={{padding:"4px 10px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,165,120,0.08)",color:"#ffa878",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                    {formatDate(dk).slice(0,5)} ⚠️
                  </button>
                );
              }).filter(Boolean)}
              {Array.from({length:7},(_,i)=>{
                const d=new Date();d.setDate(d.getDate()-i-1);
                const dk=d.toISOString().slice(0,10);
                return dailyLogs[dk]&&dailyLogs[dk].weight==null;
              }).every(v=>!v)&&<div style={{fontSize:11,color:"rgba(255,255,255,0.2)"}}>Tous les jours récents ont un poids 👍</div>}
            </div>
          </div>
        )}
      </div>

      {/* Progress summary */}
      {weightHistory.length>1&&(
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"14px 16px",marginBottom:16,border:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:2}}>Progression totale</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:totalDiff<0?"#a8ff78":totalDiff>0?"#ff8a78":"rgba(255,255,255,0.5)"}}>
              {totalDiff===0?"Stable":`${totalDiff>0?"+":""}${totalDiff.toFixed(1)} kg`}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:2}}>{weightHistory.length} pesées</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>{weightHistory[0]?.weight} → {weightHistory[weightHistory.length-1]?.weight} kg</div>
          </div>
        </div>
      )}

      {/* Weight graph */}
      <div style={{background:"rgba(255,255,255,0.03)",borderRadius:16,padding:"16px",marginBottom:16,border:"1px solid rgba(255,255,255,0.05)"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,marginBottom:12}}>📈 Évolution du poids</div>
        <WeightGraph/>
      </div>

      {/* Weight log history */}
      <div style={{background:"rgba(255,255,255,0.03)",borderRadius:16,padding:16,marginBottom:24,border:"1px solid rgba(255,255,255,0.05)"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,marginBottom:10}}>📋 Historique des pesées</div>
        {weightHistory.length===0&&<div style={{fontSize:12,color:"rgba(255,255,255,0.25)",textAlign:"center",padding:"12px 0"}}>Aucune pesée enregistrée</div>}
        {[...weightHistory].reverse().slice(0,15).map((e,i,arr)=>{
          const prev=arr[i+1];
          const diff=prev?parseFloat((e.weight-prev.weight).toFixed(1)):null;
          return(
            <div key={e.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <div>
                <span style={{fontSize:13,color:"rgba(255,255,255,0.55)"}}>{e.date===todayKey()?"Aujourd'hui":formatDateLong(e.date)}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {diff!==null&&<span style={{fontSize:11,color:diff<0?"#a8ff78":diff>0?"#ff8a78":"rgba(255,255,255,0.3)",fontWeight:600}}>{diff===0?"=":diff>0?`+${diff}`:diff}</span>}
                <span style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,color:"#a8ff78"}}>{e.weight} kg</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState("home");
  const [profile,setProfileState]=useState({name:"Mouad",weight:94,height:179,age:27,quote:"Trust the process"});
  const [dailyLogs,setDailyLogsState]=useState({});
  const [selectedDay,setSelectedDay]=useState(todayKey());
  const [showPicker,setShowPicker]=useState(false);
  const [showWeightModal,setShowWeightModal]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const syncQ=useRef({});

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){setUser(session.user);loadData(session.user.id);}
      else setLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user){setUser(session.user);loadData(session.user.id);}
      else{setUser(null);setLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function loadData(uid){
    setLoading(true);
    try{
      const [p,l]=await Promise.all([
        sb.from("profiles").select("*").eq("user_id",uid).single(),
        sb.from("daily_logs").select("*").eq("user_id",uid),
      ]);
      if(p.data)setProfileState(p.data.data);
      if(l.data){const logs={};l.data.forEach(r=>{logs[r.date]=r.data;});setDailyLogsState(logs);}
    }catch(e){console.error(e);}
    setDailyLogsState(prev=>{if(!prev[todayKey()])return{...prev,[todayKey()]:emptyLog()};return prev;});
    setLoading(false);
  }

  function scheduleSync(type,data){
    if(!user)return;
    const key=type+JSON.stringify(data).slice(0,40);
    clearTimeout(syncQ.current[key]);
    syncQ.current[key]=setTimeout(async()=>{
      setSyncing(true);
      try{
        if(type==="profile")await sb.from("profiles").upsert({user_id:user.id,data},{onConflict:"user_id"});
        if(type==="log"){const{date,log}=data;await sb.from("daily_logs").upsert({user_id:user.id,date,data:log},{onConflict:"user_id,date"});}
      }catch(e){console.error(e);}
      setSyncing(false);
    },1500);
  }

  function setProfile(val){const next=typeof val==="function"?val(profile):val;setProfileState(next);scheduleSync("profile",next);}
  function updateLog(day,fn){
    setDailyLogsState(prev=>{
      const cur=prev[day]||emptyLog(profile.weight);
      const updated=fn(cur);
      const next={...prev,[day]:updated};
      if(user)scheduleSync("log",{date:day,log:updated});
      return next;
    });
  }
  function createDay(day){
    if(!dailyLogs[day]){const nl=emptyLog();setDailyLogsState(prev=>{const n={...prev,[day]:nl};if(user)scheduleSync("log",{date:day,log:nl});return n;});}
    setSelectedDay(day);
  }
  async function signOut(){await sb.auth.signOut();setUser(null);}

  if(loading) return(
    <div style={{minHeight:"100vh",background:"#080a10",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:14,filter:"drop-shadow(0 0 30px rgba(168,255,120,0.5))"}}>⚡</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:24,color:"#fff",marginBottom:6}}>My Fit Lab</div>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:13}}>Chargement…</div>
      </div>
    </div>
  );
  if(!user) return <AuthScreen onAuth={u=>{setUser(u);loadData(u.id);}}/>;

  function getLog(day){return dailyLogs[day]||emptyLog(profile.weight);}
  const todayLog=getLog(todayKey());
  const selLog=getLog(selectedDay);
  const selPlan=buildMealPlan(selLog.isSportDay!==false,selLog.proteinKey||"poulet",selLog.carbKey||"riz");

  const weightHistory=buildWeightHistory(dailyLogs,profile.weight);

  const NAV=[
    {id:"home",    l:"Accueil",   i:"⬡"},
    {id:"nutrition",l:"Plan",     i:"📋"},
    {id:"tracking", l:"Tracking", i:"📓"},
    {id:"exercise", l:"Gym",      i:"🏋️"},
    {id:"history",  l:"Historique",i:"📅"},
    {id:"profile",  l:"Profil",   i:"👤"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#080a10",fontFamily:"'DM Sans','Segoe UI',sans-serif",color:"#fff",maxWidth:480,margin:"0 auto",paddingBottom:88}}>
      {/* Background ambient */}
      <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:480,height:300,background:"radial-gradient(ellipse at 50% 0%,rgba(168,255,120,0.04) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>

      {showPicker&&<DayPicker dailyLogs={dailyLogs} selectedDay={selectedDay} onSelect={d=>setSelectedDay(d)} onClose={()=>setShowPicker(false)} onCreateDay={d=>{createDay(d);}}/>}
      {showWeightModal&&<WeightLogModal log={todayLog} selectedDay={todayKey()} updateLog={updateLog} onClose={()=>setShowWeightModal(false)} profile={profile}/>}

      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(8,10,16,0.95)",backdropFilter:"blur(20px)",padding:"12px 20px 11px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#a8ff78,#78ffd6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#0a0c12",flexShrink:0}}>{profile.name[0]}</div>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,display:"flex",alignItems:"center",gap:6}}>
                {profile.name}
                {syncing&&<span style={{fontSize:9,color:"rgba(255,255,255,0.2)",animation:"pulse 1s infinite"}}>↑</span>}
              </div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",fontStyle:"italic"}}>"{profile.quote||"Trust the process"}"</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <div onClick={()=>setShowPicker(true)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:20,padding:"5px 10px",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.5)",cursor:"pointer"}}>
              📅 {selectedDay===todayKey()?"Auj.":formatDate(selectedDay)}
            </div>
            <div onClick={()=>updateLog(todayKey(),l=>({...l,isSportDay:!l.isSportDay}))} style={{background:todayLog.isSportDay!==false?"rgba(168,255,120,0.1)":"rgba(120,180,255,0.1)",border:`1px solid ${todayLog.isSportDay!==false?"rgba(168,255,120,0.25)":"rgba(120,180,255,0.25)"}`,borderRadius:20,padding:"5px 10px",fontSize:11,fontWeight:600,color:todayLog.isSportDay!==false?"#a8ff78":"#78b4ff",cursor:"pointer"}}>
              {todayLog.isSportDay!==false?"💪":"😴"}
            </div>
          </div>
        </div>
      </div>

      {/* Pages */}
      <div style={{position:"relative",zIndex:1}}>
        {page==="home"&&<HomePage log={todayLog} setPage={setPage} profile={profile} updateLog={updateLog} weightHistory={weightHistory} selectedDay={selectedDay} setShowWeightModal={setShowWeightModal}/>}
        {page==="nutrition"&&<NutritionPage log={selLog} selectedDay={selectedDay} updateLog={updateLog} setShowPicker={setShowPicker} mealPlan={selPlan}/>}
        {page==="tracking"&&<TrackingPage log={selLog} selectedDay={selectedDay} updateLog={updateLog} setShowPicker={setShowPicker}/>}
        {page==="exercise"&&<ExercisePage log={selLog} selectedDay={selectedDay} updateLog={updateLog} setShowPicker={setShowPicker}/>}
        {page==="history"&&<HistoryPage dailyLogs={dailyLogs} setSelectedDay={setSelectedDay} setPage={setPage} setShowPicker={setShowPicker}/>}
        {page==="profile"&&<ProfilePage profile={profile} setProfile={setProfile} dailyLogs={dailyLogs} updateLog={updateLog} selectedDay={selectedDay} setShowPicker={setShowPicker} onSignOut={signOut} userEmail={user.email}/>}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(8,10,16,0.97)",backdropFilter:"blur(28px)",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",padding:"8px 0 16px",zIndex:50}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 2px",color:page===n.id?"#a8ff78":"rgba(255,255,255,0.22)",transition:"color 0.2s"}}>
            <span style={{fontSize:page===n.id?20:17,transition:"font-size 0.2s",filter:page===n.id?"drop-shadow(0 0 8px rgba(168,255,120,0.6))":"none"}}>{n.i}</span>
            <span style={{fontSize:9,fontWeight:page===n.id?700:500,letterSpacing:0.2}}>{n.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
